<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC 수업 시스템</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --primary:#4f46e5; --primary-light:#6366f1; --primary-dark:#3730a3;
      --cyan:#06b6d4; --cyan-dark:#0e7490;
      --success:#10b981; --danger:#ef4444;
      --bg:#0f0f1a; --surface:#1a1a2e; --surface2:#16213e;
      --border:#2a2a4a; --text:#e2e8f0; --text-muted:#94a3b8;
    }
    body.light{
      --bg:#f1f5f9;--surface:#ffffff;--surface2:#f8fafc;
      --border:#cbd5e1;--text:#0f172a;--text-muted:#64748b;
    }
    body{transition:background-color .25s,color .25s;}

    body {
      font-family:'Segoe UI',system-ui,sans-serif;
      background:var(--bg); color:var(--text);
      min-height:100vh; display:flex; flex-direction:column;
    }
    header {
      height:64px; padding:0 32px; display:flex; align-items:center;
      background:var(--surface); border-bottom:1px solid var(--border);
    }
    .logo { display:flex; align-items:center; gap:10px; font-size:1.15rem; font-weight:700; }
    .logo-icon {
      width:38px; height:38px; border-radius:10px; font-size:20px;
      background:linear-gradient(135deg,var(--primary),#818cf8);
      display:flex; align-items:center; justify-content:center;
    }
    main {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:48px 24px; gap:12px;
    }
    .hero { text-align:center; margin-bottom:24px; }
    .hero h1 { font-size:2.4rem; font-weight:800; margin-bottom:10px; }
    .hero p { font-size:1rem; color:var(--text-muted); }
    .cards { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }
    .role-card {
      background:var(--surface); border:1px solid var(--border); border-radius:24px;
      padding:44px 40px; width:300px; display:flex; flex-direction:column;
      align-items:center; gap:20px; text-decoration:none; color:var(--text);
      transition:transform .2s,box-shadow .2s,border-color .2s;
    }
    .role-card.student:hover  { transform:translateY(-6px); border-color:var(--primary-light); box-shadow:0 16px 48px rgba(79,70,229,.28); }
    .role-card.instructor:hover { transform:translateY(-6px); border-color:var(--cyan); box-shadow:0 16px 48px rgba(6,182,212,.28); }
    .role-icon { width:88px; height:88px; border-radius:22px; font-size:40px; display:flex; align-items:center; justify-content:center; }
    .role-icon.s { background:rgba(79,70,229,.18); }
    .role-icon.i { background:rgba(6,182,212,.18); }
    .role-title { font-size:1.4rem; font-weight:700; }
    .role-desc { font-size:.86rem; color:var(--text-muted); text-align:center; line-height:1.65; }
    .role-btn {
      width:100%; border:none; border-radius:12px; padding:13px;
      font-size:.95rem; font-weight:700; cursor:pointer; transition:opacity .2s; color:#fff;
    }
    .role-btn.s { background:var(--primary); }
    .role-btn.i { background:linear-gradient(135deg,var(--cyan-dark),var(--cyan)); }
    .role-btn:hover { opacity:.85; }
    footer { padding:20px; text-align:center; font-size:.78rem; color:var(--text-muted); }
  </style>
</head>
<body>
  <script>if(localStorage.getItem('theme')==='light')document.body.classList.add('light');
    function applyTheme(){const l=localStorage.getItem('theme')==='light';document.body.classList.toggle('light',l);const b=document.getElementById('themeBtn');if(b)b.textContent=l?'🌙 다크':'☀️ 라이트';}
    function toggleTheme(){const l=document.body.classList.toggle('light');localStorage.setItem('theme',l?'light':'dark');const b=document.getElementById('themeBtn');if(b)b.textContent=l?'🌙 다크':'☀️ 라이트';}
  </script>

  <header>
    <div class="logo"><div class="logo-icon">📡</div>다기능 수업 비서 프로그램</div>
  </header>
  <main>
    <div class="hero">
      <h1>역할을 선택하세요</h1>
      <p>강사 또는 수강생으로 시스템에 접속합니다</p>
    </div>
    <div class="cards">
      <a class="role-card student" href="student.html">
        <div class="role-icon s">🎓</div>
        <div class="role-title">수강생</div>
        <div class="role-desc">NFC 태그로 출석하고<br>강사가 올린 자료와 문제를<br>확인하고 풀 수 있습니다</div>
        <button class="role-btn s">수강생 로그인</button>
      </a>
      <a class="role-card instructor" href="instructor.html">
        <div class="role-icon i">👨‍🏫</div>
        <div class="role-title">강사</div>
        <div class="role-desc">NFC 태그로 강의를 등록하고<br>자료·문제를 올리고<br>학생 출석·풀이를 확인합니다</div>
        <button class="role-btn i">강사 로그인</button>
      </a>
    </div>
  </main>
  <footer>Multi-Function Class Assistant Program</footer>
</body>
</html>
