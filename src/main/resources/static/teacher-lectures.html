<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강의 목록 - NFC 수업 시스템</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --primary:#4f46e5;--primary-light:#6366f1;--primary-dark:#3730a3;
      --cyan:#06b6d4;--cyan-dark:#0e7490;
      --success:#10b981;--danger:#ef4444;--warning:#f59e0b;--purple:#8b5cf6;
      --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--surface3:#1e2040;
      --border:#2a2a4a;--text:#e2e8f0;--text-muted:#94a3b8;
    }
    body.light{
      --bg:#f1f5f9;--surface:#ffffff;--surface2:#f8fafc;
      --border:#cbd5e1;--text:#0f172a;--text-muted:#64748b;
    }
    body{transition:background-color .25s,color .25s;}

    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

    /* ── HEADER ── */
    .dash-header{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;}
    .dash-logo{display:flex;align-items:center;gap:8px;font-size:1rem;font-weight:700;text-decoration:none;color:var(--text);}
    .logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--cyan-dark),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:17px;}
    .header-divider{width:1px;height:24px;background:var(--border);}
    .header-badge{background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.25);border-radius:8px;padding:4px 10px;font-size:.75rem;color:var(--cyan);font-weight:600;}
    .spacer{flex:1;}
    .theme-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px;cursor:pointer;gap:0;user-select:none;flex-shrink:0;}
    .theme-opt{padding:4px 12px;font-size:.78rem;font-weight:600;color:var(--text-muted);border-radius:16px;transition:all .2s;white-space:nowrap;}
    .theme-opt.active{background:var(--cyan-dark);color:#fff;box-shadow:0 1px 6px rgba(8,145,178,.35);}
    .user-chip{display:flex;align-items:center;gap:8px;font-size:.84rem;color:var(--text-muted);}
    .user-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--cyan-dark),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
    .user-name{font-weight:600;color:var(--text);}
    .btn-logout{background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:5px 12px;font-size:.78rem;cursor:pointer;transition:all .2s;margin-left:4px;}
    .btn-logout:hover{border-color:var(--danger);color:var(--danger);}

    /* ── MAIN ── */
    main{flex:1;padding:36px 32px;max-width:1200px;width:100%;margin:0 auto;}

    /* ── GREETING ── */
    .greeting{margin-bottom:32px;}
    .greeting-top{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
    .greeting h1{font-size:1.55rem;font-weight:800;}
    .greeting h1 span{color:var(--cyan);}
    .greeting p{font-size:.88rem;color:var(--text-muted);margin-top:5px;}
    .btn-new-lecture{background:linear-gradient(135deg,var(--cyan-dark),var(--cyan));color:#fff;border:none;border-radius:11px;padding:11px 20px;font-size:.88rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;transition:opacity .2s;}
    .btn-new-lecture:hover{opacity:.85;}

    /* ── STATS BAR ── */
    .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px;}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:14px;}
    .stat-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .stat-icon.blue{background:rgba(79,70,229,.15);}
    .stat-icon.cyan{background:rgba(6,182,212,.15);}
    .stat-icon.green{background:rgba(16,185,129,.15);}
    .stat-icon.yellow{background:rgba(245,158,11,.15);}
    .stat-val{font-size:1.5rem;font-weight:800;line-height:1;}
    .stat-lbl{font-size:.75rem;color:var(--text-muted);margin-top:3px;}

    /* ── SEARCH / FILTER ── */
    .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap;}
    .search-wrap{position:relative;flex:1;min-width:220px;}
    .search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px 10px 38px;color:var(--text);font-size:.88rem;outline:none;transition:border-color .2s;}
    .search-wrap input:focus{border-color:var(--cyan);}
    .search-wrap input::placeholder{color:var(--text-muted);}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}
    .filter-btns{display:flex;gap:8px;}
    .filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 14px;font-size:.82rem;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .2s;}
    .filter-btn:hover{border-color:var(--cyan);color:var(--cyan);}
    .filter-btn.active{background:rgba(6,182,212,.1);border-color:var(--cyan);color:var(--cyan);font-weight:600;}

    /* ── LECTURE GRID ── */
    .lecture-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;}

    /* ── LECTURE CARD ── */
    .lec-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px;display:flex;flex-direction:column;gap:16px;transition:transform .2s,box-shadow .2s,border-color .2s;cursor:pointer;}
    .lec-card:hover{transform:translateY(-4px);border-color:rgba(6,182,212,.4);box-shadow:0 12px 40px rgba(6,182,212,.12);}
    .lec-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
    .lec-color-bar{width:4px;border-radius:4px;flex-shrink:0;align-self:stretch;}
    .lec-color-bar.cyan{background:var(--cyan);}
    .lec-color-bar.purple{background:var(--purple);}
    .lec-color-bar.green{background:var(--success);}
    .lec-color-bar.yellow{background:var(--warning);}
    .lec-color-bar.blue{background:var(--primary-light);}
    .lec-info{flex:1;}
    .lec-name{font-size:1.05rem;font-weight:700;margin-bottom:4px;line-height:1.3;}
    .lec-code{font-size:.76rem;color:var(--text-muted);font-family:monospace;letter-spacing:.5px;}
    .status-badge{border-radius:7px;padding:4px 10px;font-size:.72rem;font-weight:700;white-space:nowrap;flex-shrink:0;}
    .status-badge.live{background:rgba(16,185,129,.15);color:var(--success);border:1px solid rgba(16,185,129,.3);}
    .status-badge.upcoming{background:rgba(245,158,11,.12);color:var(--warning);border:1px solid rgba(245,158,11,.3);}
    .status-badge.ended{background:rgba(148,163,184,.1);color:var(--text-muted);border:1px solid var(--border);}

    .lec-meta{display:flex;flex-direction:column;gap:7px;}
    .meta-row{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--text-muted);}
    .meta-icon{font-size:14px;width:18px;text-align:center;}

    .lec-divider{height:1px;background:var(--border);}

    .lec-bottom{display:flex;flex-direction:column;gap:10px;}
    .lec-actions{display:flex;gap:8px;}
    .lec-actions .btn-enter,.lec-actions .btn-ai-enter{flex:1;text-align:center;padding:9px 4px;}
    .attendance-mini{display:flex;align-items:center;gap:10px;}
    .att-wrap{display:flex;align-items:center;gap:5px;font-size:.8rem;}
    .att-dot{width:7px;height:7px;border-radius:50%;}
    .att-dot.present{background:var(--success);}
    .att-dot.absent{background:var(--border);}
    .att-bar-wrap{width:70px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
    .att-bar-fill{height:100%;background:var(--success);border-radius:3px;transition:width .4s;}

    .btn-enter{background:linear-gradient(135deg,var(--cyan-dark),var(--cyan));color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:.84rem;font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap;}
    .btn-enter:hover{opacity:.85;}
    .btn-enter.disabled{background:var(--surface2);color:var(--text-muted);cursor:not-allowed;opacity:1;}
    .btn-ai-enter{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#10b981;border-radius:10px;padding:9px 18px;font-size:.84rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
    .btn-ai-enter:hover{background:rgba(16,185,129,.2);}

    /* ── EMPTY STATE ── */
    .empty-state{text-align:center;padding:80px 20px;display:none;}
    .empty-icon{font-size:56px;margin-bottom:16px;}
    .empty-title{font-size:1.1rem;font-weight:700;margin-bottom:8px;}
    .empty-sub{font-size:.84rem;color:var(--text-muted);}

    /* ── RESPONSIVE ── */
    @media(max-width:700px){
      main{padding:24px 16px;}
      .stats-bar{grid-template-columns:1fr 1fr;}
      .greeting-top{flex-direction:column;align-items:flex-start;}
    }
    @media(max-width:480px){
      .stats-bar{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
  <script>if(localStorage.getItem('theme')==='light')document.body.classList.add('light');</script>


  <!-- HEADER -->
  <header class="dash-header">
    <a class="dash-logo" href="index.html">
      <div class="logo-icon">📡</div>
      NFC 수업 시스템
    </a>
    <div class="header-divider"></div>
    <span class="header-badge">강사 포털</span>
    <div class="spacer"></div>
    <div class="user-chip">
      <div class="user-av" id="avatarInitial">김</div>
      <span class="user-name" id="teacherNameDisplay">김교수</span>
    </div>
    <div class="theme-toggle" onclick="toggleTheme()">
      <span class="theme-opt" id="themeOptDark">🌙 다크</span>
      <span class="theme-opt" id="themeOptLight">☀️ 라이트</span>
    </div>
    <button class="btn-logout" onclick="openPwModal()" style="margin-right:4px;">비밀번호 수정</button>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </header>

  <!-- 비밀번호 변경 모달 -->
  <div id="pwOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:none;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border-radius:16px;padding:28px 24px;width:320px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.3);">
      <h3 style="margin:0 0 20px;font-size:1rem;color:var(--text);">비밀번호 수정</h3>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <input id="pwCurrent" type="password" placeholder="현재 비밀번호" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:.88rem;outline:none;">
        <input id="pwNew" type="password" placeholder="새 비밀번호 (8자 이상)" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:.88rem;outline:none;">
        <input id="pwConfirm" type="password" placeholder="새 비밀번호 확인" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:.88rem;outline:none;">
        <p id="pwMsg" style="margin:0;font-size:.8rem;color:var(--danger);min-height:1em;"></p>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px;">
        <button onclick="closePwModal()" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px;color:var(--text-muted);cursor:pointer;font-size:.85rem;">취소</button>
        <button onclick="submitPwChange()" style="flex:1;background:linear-gradient(135deg,var(--cyan-dark),var(--cyan));border:none;border-radius:8px;padding:9px;color:#fff;cursor:pointer;font-size:.85rem;font-weight:600;">변경</button>
      </div>
    </div>
  </div>
  <script>
    function openPwModal(){document.getElementById('pwOverlay').style.display='flex';document.getElementById('pwCurrent').value='';document.getElementById('pwNew').value='';document.getElementById('pwConfirm').value='';document.getElementById('pwMsg').textContent='';}
    function closePwModal(){document.getElementById('pwOverlay').style.display='none';}
    async function submitPwChange(){
      const cur=document.getElementById('pwCurrent').value;
      const nw=document.getElementById('pwNew').value;
      const cf=document.getElementById('pwConfirm').value;
      const msg=document.getElementById('pwMsg');
      if(!cur){msg.textContent='현재 비밀번호를 입력하세요.';return;}
      if(nw.length<8){msg.textContent='새 비밀번호는 8자 이상이어야 합니다.';return;}
      if(nw!==cf){msg.textContent='새 비밀번호가 일치하지 않습니다.';return;}
      const res=await fetch('/api/user/password',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({currentPassword:cur,newPassword:nw})});
      const data=await res.json();
      if(data.success){alert('비밀번호가 변경되었습니다.');closePwModal();}
      else{msg.style.color='var(--danger)';msg.textContent=data.message;}
    }
  </script>

  <!-- MAIN -->
  <main>

    <!-- GREETING -->
    <div class="greeting">
      <div class="greeting-top">
        <div>
          <h1>안녕하세요, <span id="teacherNameGreet">김교수</span>님 👋</h1>
          <p>담당 강의를 선택하여 강의실에 입장하세요.</p>
        </div>
      </div>

      <!-- STATS -->
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-icon blue">📚</div>
          <div>
            <div class="stat-val" id="statTotal">5</div>
            <div class="stat-lbl">전체 강의</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon cyan">🔴</div>
          <div>
            <div class="stat-val" id="statLive">1</div>
            <div class="stat-lbl">지금 진행 중</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">✅</div>
          <div>
            <div class="stat-val" id="statAvgAtt">87%</div>
            <div class="stat-lbl">평균 출석률</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon yellow">👥</div>
          <div>
            <div class="stat-val" id="statStudents">112</div>
            <div class="stat-lbl">총 수강생</div>
          </div>
        </div>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="강의명, 강의 코드로 검색..." oninput="filterLectures()">
      </div>
      <div class="filter-btns">
        <button class="filter-btn active" data-filter="all" onclick="setFilter(this,'all')">전체</button>
        <button class="filter-btn" data-filter="live" onclick="setFilter(this,'live')">진행 중</button>
        <button class="filter-btn" data-filter="upcoming" onclick="setFilter(this,'upcoming')">예정</button>
        <button class="filter-btn" data-filter="ended" onclick="setFilter(this,'ended')">종료</button>
      </div>
    </div>

    <!-- LECTURE GRID -->
    <div class="lecture-grid" id="lectureGrid"></div>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📭</div>
      <div class="empty-title">검색 결과가 없습니다</div>
      <div class="empty-sub">다른 검색어나 필터를 사용해 보세요.</div>
    </div>

  </main>

  <script>
    const COLORS = ['cyan','purple','blue','green','yellow'];
    let lectures = [];
    let currentFilter = 'all';

    /* ── 초기화 ── */
    async function init() {
      applyTheme();
      const name = localStorage.getItem('teacherName') || '강사';
      document.getElementById('teacherNameDisplay').textContent = name;
      document.getElementById('teacherNameGreet').textContent = name;
      document.getElementById('avatarInitial').textContent = name.charAt(0);

      await loadLectures();
    }

    /* ── API로 강의 목록 로드 ── */
    async function loadLectures() {
      try {
        const res = await fetch('/api/teacher/lectures');
        if (res.status === 401) { window.location.href = 'instructor.html'; return; }
        lectures = await res.json();

        // 색상 자동 배정
        lectures = lectures.map((l, i) => ({ ...l, color: COLORS[i % COLORS.length] }));

        updateStats();
        renderLectures();
      } catch (e) {
        document.getElementById('lectureGrid').innerHTML =
          '<p style="color:var(--text-muted);padding:20px;">서버에 연결할 수 없습니다.</p>';
      }
    }

    /* ── 통계 업데이트 ── */
    function updateStats() {
      document.getElementById('statTotal').textContent = lectures.length;
      const totalStudents = lectures.reduce((s, l) => s + (l.totalCount || 0), 0);
      const totalPresent  = lectures.reduce((s, l) => s + (l.presentCount || 0), 0);
      const avgAtt = totalStudents > 0 ? Math.round(totalPresent / totalStudents * 100) : 0;
      document.getElementById('statLive').textContent = lectures.length;
      document.getElementById('statAvgAtt').textContent = avgAtt + '%';
      document.getElementById('statStudents').textContent = totalStudents;
    }

    /* ── 강의 상태 계산 ── */
    function lectureStatus(l, today) {
      if (!l.lectureStart && !l.lectureEnd) return l.active ? 'live' : 'ended';
      if (l.lectureStart && today < l.lectureStart) return 'upcoming';
      if (l.lectureEnd   && today > l.lectureEnd)   return 'ended';
      return 'live';
    }

    function statusBadge(status) {
      if (status === 'live')     return '<span class="status-badge live">🔴 진행 중</span>';
      if (status === 'upcoming') return '<span class="status-badge upcoming">🔵 예정</span>';
      return '<span class="status-badge ended">⬜ 종료</span>';
    }

    function fmtPeriod(start, end) {
      if (!start && !end) return '기간 미설정';
      if (start && end)   return `${start} ~ ${end}`;
      if (start)          return `${start} ~`;
      return `~ ${end}`;
    }

    /* ── 강의 카드 렌더 ── */
    function renderLectures() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      const grid  = document.getElementById('lectureGrid');
      const empty = document.getElementById('emptyState');

      const today = new Date().toISOString().slice(0, 10);
      const filtered = lectures.filter(l => {
        const status = lectureStatus(l, today);
        if (currentFilter === 'live'     && status !== 'live')     return false;
        if (currentFilter === 'upcoming' && status !== 'upcoming') return false;
        if (currentFilter === 'ended'    && status !== 'ended')    return false;
        return !query || l.name.toLowerCase().includes(query) || l.code.toLowerCase().includes(query);
      });

      if (filtered.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      grid.innerHTML = filtered.map(l => {
        const total = l.totalCount || 0;
        const present = l.presentCount || 0;
        const absent  = total - present;
        const pct = total > 0 ? Math.round(present / total * 100) : 0;

        return `
          <div class="lec-card" onclick="enterLecture(${l.id},'${esc(l.name)}','${esc(l.code)}','${esc(l.room || '')}',${total})">
            <div class="lec-card-top">
              <div class="lec-color-bar ${l.color}"></div>
              <div class="lec-info">
                <div class="lec-name">${l.name}</div>
                <div class="lec-code">${l.code}</div>
              </div>
              ${statusBadge(lectureStatus(l, today))}
            </div>
            <div class="lec-meta">
              <div class="meta-row"><span class="meta-icon">🕐</span>${l.schedule || '일정 미정'}</div>
              <div class="meta-row"><span class="meta-icon">📍</span>${l.room || '강의실 미정'}</div>
              <div class="meta-row"><span class="meta-icon">👥</span>수강생 ${total}명</div>
              <div class="meta-row"><span class="meta-icon">📆</span>${fmtPeriod(l.lectureStart, l.lectureEnd)}</div>
            </div>
            <div class="lec-divider"></div>
            <div class="lec-bottom">
              <div class="attendance-mini">
                <div class="att-wrap">
                  <div class="att-dot present"></div>
                  <span style="color:var(--success)">${present}</span>
                </div>
                <div class="att-wrap">
                  <div class="att-dot absent"></div>
                  <span>${absent}</span>
                </div>
                <div class="att-bar-wrap">
                  <div class="att-bar-fill" style="width:${pct}%"></div>
                </div>
                <span style="font-size:.78rem;color:var(--text-muted)">${pct}%</span>
              </div>
              <div class="lec-actions">
                <button class="btn-enter"
                  onclick="event.stopPropagation();enterLecture(${l.id},'${esc(l.name)}','${esc(l.code)}','${esc(l.room || '')}',${total})">
                  강의실 입장
                </button>
                <button class="btn-ai-enter"
                  onclick="event.stopPropagation();enterAI(${l.id},'${esc(l.name)}','${esc(l.code)}','${esc(l.room || '')}')">
                  🤖 AI 분석
                </button>
                <button class="btn-ai-enter" style="background:rgba(6,182,212,.1);border-color:rgba(6,182,212,.25);color:var(--cyan);"
                  onclick="event.stopPropagation();enterManage(${l.id},'${esc(l.name)}','${esc(l.code)}','${esc(l.room || '')}')">
                  ⚙️ 강의 관리
                </button>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function esc(s) { return s.replace(/'/g,"&#39;"); }

    function setFilter(btn, filter) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = filter;
      renderLectures();
    }

    function filterLectures() { renderLectures(); }

    /* ── 강의실 입장 ── */
    function enterLecture(id, name, code, room, students) {
      sessionStorage.setItem('lecId', id);
      sessionStorage.setItem('lecName', name);
      sessionStorage.setItem('lecCode', code);
      sessionStorage.setItem('lecRoom', room);
      sessionStorage.setItem('lecStudents', students);
      window.location.href = 'teacher-classroom.html';
    }

    function enterManage(id, name, code, room) {
      sessionStorage.setItem('lecId', id);
      sessionStorage.setItem('lecName', name);
      sessionStorage.setItem('lecCode', code);
      sessionStorage.setItem('lecRoom', room);
      window.location.href = 'teacher-manage.html';
    }

    function enterAI(id, name, code, room) {
      sessionStorage.setItem('lecId', id);
      sessionStorage.setItem('lecName', name);
      sessionStorage.setItem('lecCode', code);
      sessionStorage.setItem('lecRoom', room);
      window.location.href = 'teacher-ai.html';
    }

    function logout() {
      fetch('/api/logout', { method:'POST' }).catch(()=>{});
      localStorage.removeItem('teacherName');
      sessionStorage.clear();
      window.location.href = 'instructor.html';
    }

    init();
  
    function applyTheme(){const l=localStorage.getItem('theme')==='light';document.body.classList.toggle('light',l);const d=document.getElementById('themeOptDark');const lt=document.getElementById('themeOptLight');if(d)d.classList.toggle('active',!l);if(lt)lt.classList.toggle('active',l);}
    function toggleTheme(){const l=document.body.classList.toggle('light');localStorage.setItem('theme',l?'light':'dark');const d=document.getElementById('themeOptDark');const lt=document.getElementById('themeOptLight');if(d)d.classList.toggle('active',!l);if(lt)lt.classList.toggle('active',l);}
  </script>
</body>
</html>
