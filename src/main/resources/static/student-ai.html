<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 튜터 - NFC 수업 시스템</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --primary:#4f46e5;--primary-light:#6366f1;--primary-dark:#3730a3;
      --success:#10b981;--danger:#ef4444;
      --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;
      --border:#2a2a4a;--text:#e2e8f0;--text-muted:#94a3b8;
    }
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

    /* HEADER */
    .dash-header{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;}
    .btn-back{background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:5px 12px;font-size:.8rem;cursor:pointer;transition:all .2s;}
    .btn-back:hover{border-color:var(--primary-light);color:var(--primary-light);}
    .logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#065f46,var(--success));display:flex;align-items:center;justify-content:center;font-size:15px;}
    .header-title{font-size:.95rem;font-weight:700;}
    .header-badge{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);border-radius:8px;padding:4px 10px;font-size:.72rem;color:var(--success);font-weight:600;}
    .spacer{flex:1;}
    .user-chip{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--text-muted);}
    .user-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
    .btn-logout{background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:5px 12px;font-size:.75rem;cursor:pointer;transition:all .2s;margin-left:4px;}
    .btn-logout:hover{border-color:var(--danger);color:var(--danger);}

    /* LECTURE CONTEXT BAR */
    .context-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .context-label{font-size:.75rem;color:var(--text-muted);}
    .context-name{font-size:.82rem;font-weight:700;color:var(--text);}
    .context-sep{color:var(--border);}
    .btn-clear{margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:7px;padding:4px 10px;font-size:.72rem;cursor:pointer;transition:all .2s;}
    .btn-clear:hover{border-color:var(--danger);color:var(--danger);}

    /* MESSAGES */
    .messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
    .messages::-webkit-scrollbar{width:4px;}
    .messages::-webkit-scrollbar-track{background:transparent;}
    .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

    .msg{display:flex;gap:10px;max-width:76%;}
    .msg.user{align-self:flex-end;flex-direction:row-reverse;}
    .msg.bot{align-self:flex-start;}
    .msg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;}
    .msg.bot .msg-av{background:linear-gradient(135deg,#065f46,var(--success));}
    .msg.user .msg-av{background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));}
    .msg-bubble{padding:11px 15px;border-radius:18px;font-size:.88rem;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
    .msg.bot .msg-bubble{background:var(--surface);border:1px solid var(--border);border-radius:4px 18px 18px 18px;}
    .msg.user .msg-bubble{background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));color:#fff;border-radius:18px 4px 18px 18px;}

    /* TYPING */
    .typing-wrap{display:flex;gap:10px;align-self:flex-start;}
    .typing-bubble{background:var(--surface);border:1px solid var(--border);border-radius:4px 18px 18px 18px;padding:14px 18px;display:flex;gap:5px;align-items:center;}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);animation:bounce .9s ease infinite;}
    .dot:nth-child(2){animation-delay:.15s;}
    .dot:nth-child(3){animation-delay:.3s;}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

    /* WELCOME */
    .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;text-align:center;padding:40px;}
    .welcome-icon{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,#065f46,var(--success));display:flex;align-items:center;justify-content:center;font-size:30px;}
    .welcome h2{font-size:1.2rem;font-weight:800;}
    .welcome p{font-size:.85rem;color:var(--text-muted);line-height:1.7;max-width:320px;}
    .quick-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px;}
    .quick-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);border-radius:20px;padding:7px 14px;font-size:.78rem;cursor:pointer;transition:all .2s;}
    .quick-btn:hover{border-color:var(--success);color:var(--success);}

    /* INPUT */
    .input-area{background:var(--surface);border-top:1px solid var(--border);padding:16px 24px;flex-shrink:0;}
    .input-row{display:flex;gap:10px;align-items:flex-end;}
    .inp-wrap{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:10px 14px;display:flex;align-items:flex-end;gap:8px;transition:border-color .2s;}
    .inp-wrap:focus-within{border-color:var(--success);}
    textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:.9rem;font-family:inherit;resize:none;max-height:120px;min-height:24px;line-height:1.5;}
    textarea::placeholder{color:var(--text-muted);}
    .btn-send{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#065f46,var(--success));border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center;}
    .btn-send:hover{opacity:.85;}
    .btn-send:disabled{opacity:.4;cursor:not-allowed;}
    .input-hint{font-size:.72rem;color:var(--text-muted);margin-top:8px;text-align:center;}
  </style>
</head>
<body>

  <header class="dash-header">
    <button class="btn-back" onclick="goBack()">← 강의 목록</button>
    <div class="logo-icon">🤖</div>
    <div class="header-title">AI 튜터</div>
    <div class="header-badge">GPT-4o-mini</div>
    <div class="spacer"></div>
    <div class="user-chip">
      <div class="user-av" id="avatarInitial">학</div>
      <span style="color:var(--text);font-weight:600;" id="studentName">학생</span>
    </div>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </header>

  <div class="context-bar">
    <span class="context-label">강의</span>
    <span class="context-name" id="contextLecName">-</span>
    <span class="context-sep">|</span>
    <span class="context-label">질문은 이 강의 내용 기반으로 답변됩니다</span>
    <button class="btn-clear" onclick="clearChat()">대화 초기화</button>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>AI 튜터에게 질문하세요</h2>
      <p>강의 내용이나 개념에 대해 자유롭게 질문하면<br>단계별로 친절하게 설명해 드릴게요.</p>
      <div class="quick-btns">
        <button class="quick-btn" onclick="quickAsk('이 강의에서 중요한 핵심 개념을 알려줘')">핵심 개념 요약</button>
        <button class="quick-btn" onclick="quickAsk('이해가 안 되는 부분 어떻게 공부하면 좋을까?')">학습 방법 추천</button>
        <button class="quick-btn" onclick="quickAsk('자주 나오는 시험 유형이나 문제 유형 알려줘')">시험 대비 팁</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <div class="inp-wrap">
        <textarea id="inputMsg" rows="1" placeholder="강의 내용에 대해 질문해 보세요..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="btn-send" id="btnSend" onclick="sendMessage()">➤</button>
    </div>
    <div class="input-hint">Enter로 전송 · Shift+Enter로 줄바꿈</div>
  </div>

  <script>
    const history = [];
    const lectureName = sessionStorage.getItem('lecName') || '';
    const lectureId   = sessionStorage.getItem('lecId')   || null;
    let sending = false;

    function init() {
      const name = localStorage.getItem('studentName') || '학생';
      document.getElementById('studentName').textContent   = name;
      document.getElementById('avatarInitial').textContent = name.charAt(0);
      document.getElementById('contextLecName').textContent = lectureName || '강의 미선택';
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function quickAsk(text) {
      document.getElementById('inputMsg').value = text;
      sendMessage();
    }

    async function sendMessage() {
      if (sending) return;
      const ta  = document.getElementById('inputMsg');
      const text = ta.value.trim();
      if (!text) return;

      hideWelcome();
      addMsg('user', text);
      ta.value = '';
      ta.style.height = 'auto';
      history.push({ role: 'user', content: text });

      sending = true;
      document.getElementById('btnSend').disabled = true;
      const typingEl = showTyping();

      try {
        const res = await fetch('/api/ai/student-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            lectureId: lectureId ? Number(lectureId) : null,
            lectureName: lectureName,
            context: '',
            messages: history
          })
        });
        const data = await res.json();
        typingEl.remove();

        if (res.status === 401) {
          addMsg('bot', '로그인이 필요합니다. 로그인 페이지로 이동합니다.');
          setTimeout(() => window.location.href = 'student.html', 1500);
          return;
        }

        if (data.success) {
          addMsg('bot', data.message);
          history.push({ role: 'assistant', content: data.message });
        } else {
          addMsg('bot', '오류: ' + (data.error || '응답을 받지 못했습니다.'));
        }
      } catch (e) {
        typingEl.remove();
        addMsg('bot', '서버에 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.');
      } finally {
        sending = false;
        document.getElementById('btnSend').disabled = false;
        document.getElementById('inputMsg').focus();
      }
    }

    function addMsg(role, text) {
      const wrap = document.getElementById('messages');
      const div  = document.createElement('div');
      div.className = 'msg ' + role;
      div.innerHTML = `
        <div class="msg-av">${role === 'bot' ? '🤖' : '👤'}</div>
        <div class="msg-bubble">${escHtml(text)}</div>`;
      wrap.appendChild(div);
      wrap.scrollTop = wrap.scrollHeight;
    }

    function showTyping() {
      const wrap = document.getElementById('messages');
      const div  = document.createElement('div');
      div.className = 'typing-wrap';
      div.innerHTML = `<div class="msg-av" style="background:linear-gradient(135deg,#065f46,var(--success));width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;">🤖</div>
        <div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
      wrap.appendChild(div);
      wrap.scrollTop = wrap.scrollHeight;
      return div;
    }

    function hideWelcome() {
      const w = document.getElementById('welcome');
      if (w) w.remove();
    }

    function clearChat() {
      history.length = 0;
      const wrap = document.getElementById('messages');
      wrap.innerHTML = '';
      wrap.insertAdjacentHTML('afterbegin', `
        <div class="welcome" id="welcome">
          <div class="welcome-icon">🤖</div>
          <h2>AI 튜터에게 질문하세요</h2>
          <p>강의 내용이나 개념에 대해 자유롭게 질문하면<br>단계별로 친절하게 설명해 드릴게요.</p>
          <div class="quick-btns">
            <button class="quick-btn" onclick="quickAsk('이 강의에서 중요한 핵심 개념을 알려줘')">핵심 개념 요약</button>
            <button class="quick-btn" onclick="quickAsk('이해가 안 되는 부분 어떻게 공부하면 좋을까?')">학습 방법 추천</button>
            <button class="quick-btn" onclick="quickAsk('자주 나오는 시험 유형이나 문제 유형 알려줘')">시험 대비 팁</button>
          </div>
        </div>`);
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function goBack() { window.location.href = 'student-lectures.html'; }

    function logout() {
      fetch('/api/logout', { method: 'POST' }).catch(() => {});
      localStorage.removeItem('studentName');
      sessionStorage.clear();
      window.location.href = 'student.html';
    }

    init();
  </script>
</body>
</html>
