<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강의실 - NFC 수업 시스템</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --primary:#4f46e5;--primary-light:#6366f1;--primary-dark:#3730a3;
      --success:#10b981;--danger:#ef4444;--warning:#f59e0b;
      --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;
      --border:#2a2a4a;--text:#e2e8f0;--text-muted:#94a3b8;
    }
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

    .dash-header{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;}
    .btn-back{background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:5px 12px;font-size:.8rem;cursor:pointer;transition:all .2s;}
    .btn-back:hover{border-color:var(--primary-light);color:var(--primary-light);}
    .logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));display:flex;align-items:center;justify-content:center;font-size:15px;}
    .header-title{font-size:.95rem;font-weight:700;}
    .spacer{flex:1;}
    .user-chip{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--text-muted);}
    .user-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
    .btn-logout{background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:5px 12px;font-size:.75rem;cursor:pointer;transition:all .2s;margin-left:4px;}
    .btn-logout:hover{border-color:var(--danger);color:var(--danger);}

    main{flex:1;padding:32px;max-width:960px;width:100%;margin:0 auto;}

    /* TABS */
    .tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:28px;}
    .tab{flex:1;padding:9px;border:none;background:transparent;color:var(--text-muted);font-size:.86rem;font-weight:600;border-radius:9px;cursor:pointer;transition:all .2s;}
    .tab.active{background:var(--surface2);color:var(--text);}
    .tab-panel{display:none;}
    .tab-panel.active{display:block;}

    /* SECTION TITLE */
    .section-title{font-size:.7rem;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);font-weight:600;margin-bottom:14px;}

    /* CARD */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:12px;}
    .card-title{font-size:.92rem;font-weight:700;margin-bottom:4px;}
    .card-meta{font-size:.76rem;color:var(--text-muted);}
    .card-desc{font-size:.83rem;color:var(--text-muted);margin-top:8px;line-height:1.6;}

    /* MATERIAL */
    .mat-type{display:inline-block;border-radius:6px;padding:2px 8px;font-size:.7rem;font-weight:700;margin-bottom:6px;}
    .mat-type.pdf{background:rgba(239,68,68,.15);color:var(--danger);}
    .mat-type.ppt{background:rgba(234,88,12,.15);color:#ea580c;}
    .mat-type.hwp{background:rgba(37,99,235,.15);color:#3b82f6;}
    .mat-type.link{background:rgba(79,70,229,.15);color:var(--primary-light);}
    .mat-type.video{background:rgba(245,158,11,.15);color:var(--warning);}
    .mat-type.etc{background:rgba(148,163,184,.1);color:var(--text-muted);}
    .btn-open{background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:.82rem;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:10px;}
    .btn-open:hover{opacity:.85;}
    .empty-state{text-align:center;padding:48px 20px;color:var(--text-muted);font-size:.88rem;}

    /* ASSIGNMENT */
    .asg-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:12px;}
    .asg-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;cursor:pointer;user-select:none;}
    .asg-title{font-size:.95rem;font-weight:700;}
    .asg-meta{font-size:.76rem;color:var(--text-muted);margin-top:3px;}
    .status-badge{border-radius:7px;padding:4px 10px;font-size:.74rem;font-weight:700;white-space:nowrap;flex-shrink:0;}
    .status-badge.submitted{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:var(--success);}
    .status-badge.pending{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--warning);}
    .status-badge.overdue{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--danger);}
    .status-badge.not-started{background:rgba(148,163,184,.08);border:1px solid rgba(148,163,184,.2);color:var(--text-muted);}
    .status-badge.no-limit{background:rgba(79,70,229,.1);border:1px solid rgba(79,70,229,.2);color:var(--primary-light);}
    .asg-body{display:none;border-top:1px solid var(--border);margin-top:14px;padding-top:14px;}
    .asg-body.open{display:block;}
    .asg-content{font-size:.85rem;color:var(--text-muted);line-height:1.6;white-space:pre-wrap;margin-bottom:12px;}
    .attach-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
    .attach-chip{display:inline-flex;align-items:center;gap:5px;border-radius:7px;padding:5px 10px;font-size:.78rem;font-weight:600;text-decoration:none;cursor:pointer;transition:opacity .2s;}
    .attach-chip:hover{opacity:.8;}
    .attach-chip.pdf{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.2);}
    .attach-chip.ppt{background:rgba(234,88,12,.12);color:#ea580c;border:1px solid rgba(234,88,12,.2);}
    .attach-chip.hwp{background:rgba(37,99,235,.12);color:#3b82f6;border:1px solid rgba(37,99,235,.2);}
    .attach-chip.link{background:rgba(79,70,229,.12);color:var(--primary-light);border:1px solid rgba(79,70,229,.2);}
    .sub-section{margin-top:16px;}
    .sub-section-title{font-size:.72rem;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);font-weight:600;margin-bottom:10px;}
    .text-answer{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 14px;color:var(--text);font-size:.85rem;font-family:inherit;resize:vertical;min-height:80px;outline:none;margin-bottom:10px;transition:border-color .2s;}
    .text-answer:focus{border-color:var(--primary-light);}
    .text-answer::placeholder{color:var(--text-muted);}
    .sub-items-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
    .sub-item-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 12px;}
    .sub-item-row select{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 7px;color:var(--text);font-size:.78rem;cursor:pointer;}
    .sub-item-row input[type="text"]{flex:1;background:transparent;border:none;color:var(--text);font-size:.82rem;outline:none;}
    .sub-item-row input[type="text"]::placeholder{color:var(--text-muted);}
    .sub-item-row .item-filename{font-size:.82rem;color:var(--text-muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .sub-item-row .btn-upload{background:transparent;border:1px solid var(--border);border-radius:7px;padding:4px 10px;color:var(--text-muted);font-size:.78rem;cursor:pointer;white-space:nowrap;transition:all .2s;}
    .sub-item-row .btn-upload:hover{border-color:var(--primary-light);color:var(--primary-light);}
    .btn-remove-item{background:transparent;border:none;color:var(--text-muted);font-size:1rem;cursor:pointer;padding:0 2px;line-height:1;transition:color .2s;}
    .btn-remove-item:hover{color:var(--danger);}
    .btn-add-item{background:transparent;border:1px dashed var(--border);color:var(--text-muted);border-radius:8px;padding:7px;font-size:.8rem;cursor:pointer;width:100%;margin-bottom:10px;transition:all .2s;}
    .btn-add-item:hover{border-color:var(--primary-light);color:var(--primary-light);}
    .btn-submit{background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));color:#fff;border:none;border-radius:9px;padding:9px 20px;font-size:.84rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
    .btn-submit:hover{opacity:.85;}
    .btn-submit:disabled{opacity:.45;cursor:not-allowed;}
    .result-msg{margin-top:10px;padding:10px 14px;border-radius:9px;font-size:.83rem;font-weight:600;}
    .result-msg.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--success);}
    .result-msg.error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:var(--danger);}
    .result-msg.info{background:rgba(79,70,229,.1);border:1px solid rgba(79,70,229,.25);color:var(--primary-light);}

    /* 채점 결과 */
    .grade-box{background:rgba(99,102,241,.07);border:1px solid rgba(99,102,241,.25);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
    .grade-box-label{font-size:.7rem;color:var(--primary-light);font-weight:700;margin-bottom:5px;}
    .grade-score{font-size:1.15rem;font-weight:800;color:var(--primary-light);}
    .grade-feedback{font-size:.83rem;color:var(--text-muted);margin-top:4px;line-height:1.5;white-space:pre-wrap;}

    /* 푸시 알림 배너 */
    .push-banner{background:rgba(79,70,229,.1);border:1px solid rgba(79,70,229,.25);border-radius:12px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .push-banner-text{font-size:.83rem;color:var(--primary-light);}
    .btn-push{background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .2s;}
    .btn-push:hover{opacity:.85;}

    /* STATUS */
    .status-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
    .status-btn{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:14px 12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;text-align:left;}
    .status-btn:hover{border-color:var(--primary-light);background:rgba(79,70,229,.08);}
    .status-btn.active{border-color:var(--primary-light);background:rgba(79,70,229,.12);}
    .status-emoji{font-size:22px;flex-shrink:0;width:28px;text-align:center;}
    .status-label{font-size:.82rem;font-weight:600;line-height:1.3;color:var(--text);}
    .current-status-box{background:rgba(79,70,229,.1);border:1px solid rgba(79,70,229,.25);border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .current-status-text{font-size:.88rem;font-weight:700;color:var(--primary-light);}
    .btn-clear-status{background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:5px 12px;font-size:.78rem;cursor:pointer;transition:all .2s;}
    .btn-clear-status:hover{border-color:var(--danger);color:var(--danger);}
    .status-hint{font-size:.78rem;color:var(--text-muted);text-align:center;padding:8px 0;}

    /* Q&A */
    .qa-form{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:20px;}
    .qa-form textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 14px;color:var(--text);font-size:.85rem;font-family:inherit;resize:vertical;min-height:80px;outline:none;transition:border-color .2s;margin-bottom:10px;}
    .qa-form textarea:focus{border-color:var(--primary-light);}
    .qa-form textarea::placeholder{color:var(--text-muted);}
    .btn-ask{background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));color:#fff;border:none;border-radius:9px;padding:9px 20px;font-size:.84rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
    .btn-ask:hover{opacity:.85;}
    .q-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:10px;}
    .q-content{font-size:.88rem;line-height:1.6;margin-bottom:8px;}
    .q-meta{font-size:.74rem;color:var(--text-muted);}
    .q-answer{margin-top:12px;padding:12px 14px;background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:9px;}
    .q-answer-label{font-size:.72rem;color:var(--success);font-weight:700;margin-bottom:4px;}
    .q-answer-text{font-size:.85rem;line-height:1.6;}
    .q-pending{font-size:.76rem;color:var(--text-muted);margin-top:8px;font-style:italic;}
  </style>
</head>
<body>

  <header class="dash-header">
    <button class="btn-back" onclick="goBack()">← 강의 목록</button>
    <div class="logo-icon">📚</div>
    <div class="header-title" id="headerLecName">강의실</div>
    <div class="spacer"></div>
    <div class="user-chip">
      <div class="user-av" id="avatarInitial">학</div>
      <span style="color:var(--text);font-weight:600;" id="studentName">학생</span>
    </div>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </header>

  <main>
    <!-- 푸시 알림 허용 배너 (미허용 시 표시) -->
    <div class="push-banner" id="pushBanner" style="display:none;">
      <span class="push-banner-text">📲 채점 결과를 즉시 알림으로 받아보세요!</span>
      <button class="btn-push" onclick="requestPushPermission()">알림 받기</button>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('materials', this)">📎 강의 자료</button>
      <button class="tab" onclick="switchTab('assignments', this)">📋 과제</button>
      <button class="tab" onclick="switchTab('qa', this)">💬 Q&A</button>
      <button class="tab" onclick="switchTab('announcements', this)">📢 공지</button>
      <button class="tab" onclick="switchTab('status', this)">🗣 상태 알리기</button>
    </div>

    <!-- 강의 자료 -->
    <div class="tab-panel active" id="tab-materials">
      <div class="section-title">강의 자료</div>
      <div id="materialList"><div class="empty-state">불러오는 중...</div></div>
    </div>

    <!-- 과제 -->
    <div class="tab-panel" id="tab-assignments">
      <div class="section-title">과제 목록</div>
      <div id="assignmentList"><div class="empty-state">불러오는 중...</div></div>
    </div>

    <!-- 공지 -->
    <div class="tab-panel" id="tab-announcements">
      <div class="section-title">강사 공지</div>
      <div id="announcementList"><div class="empty-state">불러오는 중...</div></div>
    </div>

    <!-- 상태 알리기 -->
    <div class="tab-panel" id="tab-status">
      <div class="section-title">지금 내 상태를 강사에게 알립니다</div>
      <div id="currentStatusBox" style="display:none;" class="current-status-box">
        <span class="current-status-text" id="currentStatusText"></span>
      </div>
      <div class="status-grid" id="statusGrid"></div>
      <div class="status-hint">상태를 선택하면 강사 화면에 즉시 표시됩니다.<br>말하기 어려울 때 버튼 하나로 전달하세요.</div>
    </div>

    <!-- Q&A -->
    <div class="tab-panel" id="tab-qa">
      <div class="section-title">질문하기</div>
      <div class="qa-form">
        <textarea id="qaInput" placeholder="강의나 문제에 대해 질문해 보세요..."></textarea>
        <button class="btn-ask" onclick="submitQuestion()">질문 등록</button>
      </div>
      <div class="section-title">질문 목록</div>
      <div id="qaList"><div class="empty-state">불러오는 중...</div></div>
    </div>
  </main>

  <script>
    const lectureId   = sessionStorage.getItem('lecId');
    const lectureName = sessionStorage.getItem('lecName') || '강의';

    function init() {
      if (!lectureId) { window.location.href = 'student-lectures.html'; return; }
      const name = localStorage.getItem('studentName') || '학생';
      document.getElementById('studentName').textContent   = name;
      document.getElementById('avatarInitial').textContent = name.charAt(0);
      document.getElementById('headerLecName').textContent = lectureName;
      loadMaterials();
      loadAssignments();
      loadQuestions();
      initStatusTab();
      loadCurrentStatus();
      initPush();
    }

    /* ── Web Push 초기화 ── */
    async function initPush() {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
      try {
        await navigator.serviceWorker.register('/sw.js');
        const perm = Notification.permission;
        if (perm === 'default') {
          document.getElementById('pushBanner').style.display = 'flex';
        } else if (perm === 'granted') {
          await subscribePush(); // 이미 허용됐으면 자동 구독 등록
        }
      } catch (e) { /* 무시 */ }
    }

    async function requestPushPermission() {
      const result = await Notification.requestPermission();
      document.getElementById('pushBanner').style.display = 'none';
      if (result === 'granted') await subscribePush();
    }

    async function subscribePush() {
      try {
        const keyRes = await fetch('/api/push/vapid-public-key');
        if (!keyRes.ok) return;
        const { publicKey } = await keyRes.json();
        if (!publicKey) return;

        const reg = await navigator.serviceWorker.ready;
        let sub = await reg.pushManager.getSubscription();
        if (!sub) {
          sub = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(publicKey)
          });
        }
        await fetch('/api/push/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(sub.toJSON())
        });
      } catch (e) { /* 무시 */ }
    }

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64  = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const raw     = atob(base64);
      return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
    }

    function switchTab(name, btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + name).classList.add('active');
      if (name === 'announcements') loadAnnouncements();
    }

    /* ── 강의 자료 ── */
    async function loadMaterials() {
      const res  = await fetch(`/api/lecture/${lectureId}/materials`).catch(() => null);
      const list = document.getElementById('materialList');
      if (!res || !res.ok) { list.innerHTML = '<div class="empty-state">자료를 불러올 수 없습니다.</div>'; return; }
      const data = await res.json();
      if (!data.length) { list.innerHTML = '<div class="empty-state">등록된 강의 자료가 없습니다.</div>'; return; }
      list.innerHTML = data.map(m => `
        <div class="card">
          <span class="mat-type ${m.type || 'etc'}">${typeLabel(m.type)}</span>
          <div class="card-title">${esc(m.title)}</div>
          ${m.description ? `<div class="card-desc">${esc(m.description)}</div>` : ''}
          ${m.url ? matActionBtn(m) : ''}
        </div>`).join('');
    }

    function typeLabel(t) {
      return {pdf:'PDF',ppt:'PPT',hwp:'한글',link:'링크',video:'영상',etc:'기타'}[t] || '기타';
    }

    function matActionBtn(m) {
      const t = m.type;
      // 외부 링크는 직접 새 탭
      if (t === 'link' || !m.url) {
        return m.url ? `<a href="${esc(m.url)}" target="_blank" rel="noopener" class="btn-open" style="display:inline-block;text-decoration:none;">열기 →</a>` : '';
      }
      // 서버 파일(pdf/ppt/hwp/video): fetch → blob URL 방식으로 처리
      // (Chrome의 자체서명 인증서 재검증 오류 우회)
      const label = {pdf:'📄 열기', ppt:'⬇ 다운로드', hwp:'⬇ 다운로드', video:'▶ 영상 열기'}[t] || '열기 →';
      return `<button class="btn-open" data-url="${esc(m.url)}" data-type="${esc(t)}" data-title="${esc(m.title)}" onclick="openMaterial(this)">${label}</button>`;
    }

    async function openMaterial(btn) {
      const url   = btn.dataset.url;
      const type  = btn.dataset.type;
      const title = btn.dataset.title || 'file';

      btn.disabled = true;
      btn.textContent = '불러오는 중...';
      try {
        const res = await fetch(url);
        if (!res.ok) { alert('파일을 불러올 수 없습니다. (서버 오류)'); return; }
        const blob   = await res.blob();
        const blobUrl = URL.createObjectURL(blob);

        if (type === 'pdf' || type === 'video') {
          // 뷰어에서 열기
          window.open(blobUrl, '_blank');
        } else {
          // PPT, HWP: 다운로드
          const ext = url.split('.').pop().split('?')[0];
          const a   = document.createElement('a');
          a.href     = blobUrl;
          a.download = title + (ext ? '.' + ext : '');
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        }
        setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);
      } catch (e) {
        alert('파일을 불러올 수 없습니다.');
      } finally {
        const label = {pdf:'📄 열기', ppt:'⬇ 다운로드', hwp:'⬇ 다운로드', video:'▶ 영상 열기'}[type] || '열기 →';
        btn.textContent = label;
        btn.disabled = false;
      }
    }

    /* ── 과제 ── */
    async function loadAssignments() {
      const list = document.getElementById('assignmentList');
      const [asgRes, subRes] = await Promise.all([
        fetch(`/api/lecture/${lectureId}/assignments`).catch(() => null),
        fetch(`/api/lecture/${lectureId}/my-submissions`).catch(() => null)
      ]);
      if (!asgRes || !asgRes.ok) { list.innerHTML = '<div class="empty-state">과제를 불러올 수 없습니다.</div>'; return; }
      const assignments = await asgRes.json();
      const mySubList   = (subRes && subRes.ok) ? await subRes.json() : [];
      if (!assignments.length) { list.innerHTML = '<div class="empty-state">등록된 과제가 없습니다.</div>'; return; }
      const subMap = {};
      mySubList.forEach(s => { subMap[s.assignmentId] = s; });
      list.innerHTML = assignments.map(a => renderAssignment(a, subMap[a.id])).join('');
    }

    function renderAssignment(a, mySub) {
      const now     = new Date();
      const start   = a.dueStart ? new Date(a.dueStart) : null;
      const end     = a.dueEnd   ? new Date(a.dueEnd)   : null;
      const canSubmit = (!start || now >= start) && (!end || now <= end);
      const isOverdue = end && now > end;
      const notStarted = start && now < start;

      // 상태 뱃지
      let badge = '';
      if (mySub) {
        const isEdited = mySub.updatedAt && mySub.submittedAt && mySub.updatedAt !== mySub.submittedAt;
        badge = `<span class="status-badge submitted">✓ 제출완료${isEdited?' (수정됨)':''}</span>`;
      } else if (notStarted) {
        badge = `<span class="status-badge not-started">아직 시작 전</span>`;
      } else if (isOverdue) {
        badge = `<span class="status-badge overdue">기한 초과</span>`;
      } else if (!start && !end) {
        badge = `<span class="status-badge no-limit">기간 제한 없음</span>`;
      } else {
        badge = `<span class="status-badge pending">${ddayStr(end)}</span>`;
      }

      const dueMeta = fmtDueRange(a.dueStart, a.dueEnd);

      // 강사 첨부자료 칩
      const attachChips = (a.attachments || []).map(att => {
        const label = {pdf:'📄 PDF',ppt:'📊 PPT',hwp:'📝 한글',link:'🔗 링크'}[att.type] || att.type;
        if (att.type === 'link') {
          return `<a href="${esc(att.url)}" target="_blank" rel="noopener" class="attach-chip link">${label} ${esc(att.name||att.url)}</a>`;
        }
        return `<button class="attach-chip ${esc(att.type||'etc')}" onclick="openAttach('${esc(att.url)}','${esc(att.type)}','${esc(att.name||'')}')">
          ${label} ${esc(att.name||att.url)}</button>`;
      }).join('');

      // 내 기존 제출 표시
      let mySubHtml = '';
      if (mySub) {
        const items = (mySub.items || []).map(it => {
          const label = {pdf:'📄 PDF',ppt:'📊 PPT',hwp:'📝 한글',link:'🔗 링크'}[it.type] || it.type;
          return `<a href="${esc(it.url)}" target="_blank" rel="noopener" class="attach-chip ${esc(it.type||'etc')}" style="text-decoration:none;">${label} ${esc(it.name||it.url)}</a>`;
        }).join('');
        mySubHtml = `
          <div style="background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:10px;padding:12px 14px;margin-bottom:12px;">
            <div style="font-size:.72rem;color:var(--success);font-weight:700;margin-bottom:6px;">내 제출 내용 · ${mySub.submittedAt||''}</div>
            ${mySub.textContent ? `<div style="font-size:.84rem;white-space:pre-wrap;line-height:1.5;margin-bottom:8px;">${esc(mySub.textContent)}</div>` : ''}
            ${items ? `<div class="attach-chips">${items}</div>` : ''}
          </div>`;
      }

      // 채점 결과 표시
      let gradeHtml = '';
      if (mySub && (mySub.grade !== null && mySub.grade !== undefined || mySub.feedback)) {
        gradeHtml = `
          <div class="grade-box">
            <div class="grade-box-label">📊 채점 결과 · ${mySub.gradedAt || ''}</div>
            ${mySub.grade !== null && mySub.grade !== undefined
              ? `<div class="grade-score">${mySub.grade}점 / 100</div>` : ''}
            ${mySub.feedback
              ? `<div class="grade-feedback">${esc(mySub.feedback)}</div>` : ''}
          </div>`;
      }

      const submitBtnLabel = mySub ? (canSubmit ? '수정 제출' : '제출 마감') : (canSubmit ? '제출하기' : '제출 불가');
      const submitDisabled = !canSubmit ? 'disabled' : '';

      return `
      <div class="asg-card" id="asg-${a.id}">
        <div class="asg-header" onclick="toggleAsg(${a.id})">
          <div>
            <div class="asg-title">${esc(a.title)}</div>
            <div class="asg-meta">${dueMeta}</div>
          </div>
          ${badge}
        </div>
        <div class="asg-body" id="asg-body-${a.id}">
          ${a.content ? `<div class="asg-content">${esc(a.content)}</div>` : ''}
          ${attachChips ? `<div class="attach-chips">${attachChips}</div>` : ''}
          ${gradeHtml}
          ${mySubHtml}
          ${canSubmit || mySub ? `
          <div class="sub-section">
            <div class="sub-section-title">${mySub ? '제출 수정' : '과제 제출'}</div>
            <textarea class="text-answer" id="sub-text-${a.id}" placeholder="자유롭게 내용을 입력하세요 (선택)...">${mySub ? esc(mySub.textContent||'') : ''}</textarea>
            <div class="sub-items-list" id="sub-items-${a.id}"></div>
            <button class="btn-add-item" onclick="addSubItem(${a.id})">+ 파일 또는 링크 추가</button>
            <div>
              <button class="btn-submit" id="btn-sub-${a.id}" ${submitDisabled} onclick="submitAssignment(${a.id})">${submitBtnLabel}</button>
            </div>
            <div id="sub-result-${a.id}"></div>
          </div>` : ''}
        </div>
      </div>`;
    }

    function toggleAsg(asgId) {
      const body = document.getElementById(`asg-body-${asgId}`);
      if (body) body.classList.toggle('open');
    }

    async function openAttach(url, type, name) {
      if (type === 'link') { window.open(url, '_blank', 'noopener'); return; }
      try {
        const res  = await fetch(url);
        if (!res.ok) { alert('파일을 불러올 수 없습니다.'); return; }
        const blob = await res.blob();
        const blobUrl = URL.createObjectURL(blob);
        if (type === 'pdf') {
          window.open(blobUrl, '_blank');
        } else {
          const a = document.createElement('a');
          a.href = blobUrl; a.download = name || 'file';
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }
        setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);
      } catch { alert('파일을 불러올 수 없습니다.'); }
    }

    /* 제출 항목 추가 */
    function addSubItem(asgId) {
      const list = document.getElementById(`sub-items-${asgId}`);
      const row  = document.createElement('div');
      row.className = 'sub-item-row';
      row.innerHTML = `
        <select onchange="toggleSubItemMode(this)">
          <option value="pdf">PDF</option>
          <option value="ppt">PPT</option>
          <option value="hwp">한글</option>
          <option value="link">링크</option>
        </select>
        <div class="file-part" style="display:flex;align-items:center;gap:6px;flex:1;">
          <input type="file" accept=".pdf" style="display:none;" onchange="uploadSubFile(this)">
          <button type="button" class="btn-upload" onclick="this.previousElementSibling.click()">📂 탐색</button>
          <span class="item-filename">선택된 파일 없음</span>
          <input type="hidden" class="item-url" value="">
        </div>
        <div class="link-part" style="display:none;flex:1;">
          <input type="text" placeholder="https://..." class="link-url-input" style="width:100%;background:transparent;border:none;color:var(--text);font-size:.82rem;outline:none;" />
        </div>
        <button type="button" class="btn-remove-item" onclick="this.parentElement.remove()">✕</button>`;
      list.appendChild(row);
    }

    function toggleSubItemMode(sel) {
      const row      = sel.parentElement;
      const filePart = row.querySelector('.file-part');
      const linkPart = row.querySelector('.link-part');
      const fileIn   = filePart.querySelector('input[type="file"]');
      const isLink   = sel.value === 'link';
      filePart.style.display = isLink ? 'none' : 'flex';
      linkPart.style.display = isLink ? 'flex' : 'none';
      if (!isLink) {
        const acceptMap = { pdf:'.pdf', ppt:'.ppt,.pptx', hwp:'.hwp,.hwpx' };
        fileIn.setAttribute('accept', acceptMap[sel.value] || '.pdf');
      }
    }

    async function uploadSubFile(input) {
      const file = input.files[0];
      if (!file) return;
      const row    = input.closest('.sub-item-row');
      const span   = row.querySelector('.item-filename');
      const urlHid = row.querySelector('.item-url');
      span.textContent = '업로드 중...';
      const formData = new FormData();
      formData.append('file', file);
      const res = await fetch('/api/files/upload', { method:'POST', body: formData }).catch(() => null);
      if (!res || !res.ok) { span.textContent = '업로드 실패'; return; }
      const data = await res.json();
      urlHid.value      = data.url;
      span.textContent  = file.name;
    }

    function collectSubItems(asgId) {
      const rows  = document.querySelectorAll(`#sub-items-${asgId} .sub-item-row`);
      const items = [];
      rows.forEach(row => {
        const type   = row.querySelector('select').value;
        const isLink = type === 'link';
        let url = '', name = '';
        if (isLink) {
          url  = row.querySelector('.link-url-input')?.value.trim() || '';
          name = url;
        } else {
          url  = row.querySelector('.item-url')?.value.trim() || '';
          const span = row.querySelector('.item-filename');
          name = span ? span.textContent.trim() : '';
          if (name === '선택된 파일 없음' || name === '업로드 중...') name = '';
        }
        if (url) items.push({ type, url, name: name || url });
      });
      return items;
    }

    async function submitAssignment(asgId) {
      const textContent = document.getElementById(`sub-text-${asgId}`)?.value.trim() || '';
      const items       = collectSubItems(asgId);
      if (!textContent && !items.length) {
        document.getElementById(`sub-result-${asgId}`).innerHTML =
          '<div class="result-msg info">텍스트 내용이나 파일/링크 중 하나 이상을 입력하세요.</div>';
        return;
      }
      const btn = document.getElementById(`btn-sub-${asgId}`);
      btn.disabled = true;
      const res = await fetch(`/api/lecture/${lectureId}/assignments/${asgId}/submit`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ textContent, items })
      }).catch(() => null);
      btn.disabled = false;
      const resultEl = document.getElementById(`sub-result-${asgId}`);
      if (!res) { resultEl.innerHTML = '<div class="result-msg error">서버 오류가 발생했습니다.</div>'; return; }
      const data = await res.json();
      if (data.success) {
        resultEl.innerHTML = `<div class="result-msg success">${data.updated ? '제출이 수정되었습니다!' : '제출 완료!'}</div>`;
        setTimeout(() => loadAssignments(), 1200);
      } else {
        resultEl.innerHTML = `<div class="result-msg error">${esc(data.message || '제출에 실패했습니다.')}</div>`;
      }
    }

    function ddayStr(end) {
      if (!end) return '제출 가능';
      const diff = Math.ceil((end - new Date()) / (1000 * 60 * 60 * 24));
      if (diff === 0) return 'D-day';
      if (diff > 0) return `D-${diff}`;
      return '기한 초과';
    }

    function fmtDueRange(start, end) {
      if (!start && !end) return '기간 제한 없음';
      const fmt = dt => dt ? dt.replace('T', ' ').substring(0, 16) : '';
      if (start && end) return `${fmt(start)} ~ ${fmt(end)}`;
      if (end) return `마감: ${fmt(end)}`;
      return `시작: ${fmt(start)}`;
    }

    /* ── Q&A ── */
    async function loadQuestions() {
      const res  = await fetch(`/api/lecture/${lectureId}/questions`).catch(() => null);
      const list = document.getElementById('qaList');
      if (!res || !res.ok) { list.innerHTML = '<div class="empty-state">질문을 불러올 수 없습니다.</div>'; return; }
      const data = await res.json();
      if (!data.length) { list.innerHTML = '<div class="empty-state">등록된 질문이 없습니다.</div>'; return; }
      list.innerHTML = data.map(q => `
        <div class="q-card">
          <div class="q-content">${esc(q.content)}</div>
          <div class="q-meta">${esc(q.studentName || '학생')} · ${fmtTime(q.createdAt)}</div>
          ${q.answer
            ? `<div class="q-answer"><div class="q-answer-label">강사 답변</div><div class="q-answer-text">${esc(q.answer)}</div></div>`
            : `<div class="q-pending">답변 대기 중...</div>`}
        </div>`).join('');
    }

    async function submitQuestion() {
      const content = document.getElementById('qaInput').value.trim();
      if (!content) { alert('질문 내용을 입력해주세요.'); return; }
      const name = localStorage.getItem('studentName') || '학생';
      const res = await fetch(`/api/lecture/${lectureId}/questions`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ studentName: name, content })
      }).catch(() => null);
      if (res && res.ok) {
        document.getElementById('qaInput').value = '';
        loadQuestions();
      } else {
        alert('질문 등록에 실패했습니다. 다시 시도해주세요.');
      }
    }

    function fmtTime(dt) {
      if (!dt) return '';
      try { return new Date(dt).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
      catch { return ''; }
    }

    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── 상태 알리기 ── */
    const STATUS_OPTIONS = [
      { emoji: '✅', label: '강의 잘 이해하고 있어요' },
      { emoji: '😕', label: '강의 따라가기 어려워요' },
      { emoji: '🐢', label: '조금 더 천천히 부탁해요' },
      { emoji: '🙋', label: '질문 있어요 (말하기 어려워요)' },
      { emoji: '✏️', label: '잠깐요, 필기 중이에요' },
      { emoji: '👍', label: '이해 완료! 넘어가도 돼요' },
      { emoji: '🚻', label: '화장실 사용 중' },
      { emoji: '🪑', label: '잠시 자리 비움' },
      { emoji: '🤖', label: 'AI에게 추가 설명 요청 중' },
      { emoji: '😵', label: '집중하기 힘들어요' },
    ];

    let currentStatus = '';

    function initStatusTab() {
      const grid = document.getElementById('statusGrid');
      grid.innerHTML = STATUS_OPTIONS.map((s, i) =>
        `<button class="status-btn" data-idx="${i}">
          <span class="status-emoji">${s.emoji}</span>
          <span class="status-label">${s.label}</span>
        </button>`
      ).join('');
      grid.querySelectorAll('.status-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const s = STATUS_OPTIONS[Number(btn.dataset.idx)];
          setStatus(s.emoji + ' ' + s.label, btn);
        });
      });
    }

    async function loadCurrentStatus() {
      const res = await fetch(`/api/student/status?lectureId=${lectureId}`).catch(() => null);
      if (!res || !res.ok) return;
      const data = await res.json();
      applyStatusUI(data.status || '');
    }

    function applyStatusUI(status) {
      currentStatus = status;
      const box  = document.getElementById('currentStatusBox');
      const text = document.getElementById('currentStatusText');
      document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
      if (status) {
        box.style.display = 'flex';
        text.textContent = '현재 상태: ' + status;
        // 현재 상태와 일치하는 버튼 active 처리
        document.querySelectorAll('.status-btn').forEach(b => {
          const s = STATUS_OPTIONS[Number(b.dataset.idx)];
          if (s && (s.emoji + ' ' + s.label) === status) b.classList.add('active');
        });
      } else {
        box.style.display = 'none';
      }
    }

    async function setStatus(status, clickedBtn) {
      if (!lectureId) { alert('강의 정보가 없습니다. 강의 목록에서 다시 입장해주세요.'); return; }
      // 이미 활성화된 상태를 다시 누르면 상태 해제
      if (clickedBtn && clickedBtn.classList.contains('active')) {
        await clearStatus();
        return;
      }
      const res = await fetch('/api/student/status', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lectureId: Number(lectureId), status })
      }).catch(() => null);
      if (res && res.ok) {
        applyStatusUI(status);
      } else {
        console.error('상태 전송 실패', res && res.status);
      }
    }

    async function clearStatus() {
      const res = await fetch(`/api/student/status?lectureId=${lectureId}`, {
        method: 'DELETE'
      }).catch(() => null);
      if (res && res.ok) applyStatusUI('');
    }

    /* ── 공지 ── */
    async function loadAnnouncements() {
      const list = document.getElementById('announcementList');
      const res  = await fetch(`/api/lecture/${lectureId}/announcements`).catch(() => null);
      if (!res || !res.ok) { list.innerHTML = '<div class="empty-state">불러오기 실패</div>'; return; }
      const data = await res.json();
      if (!data.length) { list.innerHTML = '<div class="empty-state">등록된 공지가 없습니다.</div>'; return; }
      list.innerHTML = data.map(a => `
        <div class="q-card">
          <div class="q-content" style="font-weight:700;">${esc(a.title)}</div>
          <div class="q-meta">${esc(a.createdAt)}</div>
          ${a.content ? `<div class="q-answered" style="margin-top:8px;white-space:pre-wrap;">${esc(a.content)}</div>` : ''}
        </div>`).join('');
    }

    function goBack() { window.location.href = 'student-lectures.html'; }
    function logout() {
      fetch('/api/logout',{method:'POST'}).catch(()=>{});
      localStorage.removeItem('studentName');
      sessionStorage.clear();
      window.location.href = 'student.html';
    }

    init();
  </script>
</body>
</html>
