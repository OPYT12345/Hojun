<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀 AI 상담 - NFC 수업 시스템</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --purple:#8b5cf6;--purple-light:#a78bfa;--purple-dark:#6d28d9;
      --danger:#ef4444;
      --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;
      --border:#2a2a4a;--text:#e2e8f0;--text-muted:#94a3b8;
    }
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

    /* HEADER */
    .dash-header{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;}
    .btn-back{background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:5px 12px;font-size:.8rem;cursor:pointer;transition:all .2s;}
    .btn-back:hover{border-color:var(--purple-light);color:var(--purple-light);}
    .logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--purple-dark),var(--purple-light));display:flex;align-items:center;justify-content:center;font-size:15px;}
    .header-title{font-size:.95rem;font-weight:700;}
    .header-badge{background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:4px 10px;font-size:.72rem;color:var(--purple-light);font-weight:600;}
    .spacer{flex:1;}
    .user-chip{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--text-muted);}
    .user-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--purple-dark),var(--purple-light));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
    .btn-logout{background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:5px 12px;font-size:.75rem;cursor:pointer;transition:all .2s;margin-left:4px;}
    .btn-logout:hover{border-color:var(--danger);color:var(--danger);}

    /* PRIVACY BAR */
    .privacy-bar{background:rgba(139,92,246,.08);border-bottom:1px solid rgba(139,92,246,.2);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .privacy-icon{font-size:14px;}
    .privacy-text{font-size:.78rem;color:var(--purple-light);}
    .btn-clear{margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:7px;padding:4px 10px;font-size:.72rem;cursor:pointer;transition:all .2s;}
    .btn-clear:hover{border-color:var(--danger);color:var(--danger);}

    /* MESSAGES */
    .messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
    .messages::-webkit-scrollbar{width:4px;}
    .messages::-webkit-scrollbar-track{background:transparent;}
    .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

    .msg{display:flex;gap:10px;max-width:76%;}
    .msg.user{align-self:flex-end;flex-direction:row-reverse;}
    .msg.bot{align-self:flex-start;}
    .msg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;}
    .msg.bot .msg-av{background:linear-gradient(135deg,var(--purple-dark),var(--purple-light));}
    .msg.user .msg-av{background:linear-gradient(135deg,#1e3a5f,#3b82f6);}
    .msg-bubble{padding:11px 15px;border-radius:18px;font-size:.88rem;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
    .msg.bot .msg-bubble{background:var(--surface);border:1px solid var(--border);border-radius:4px 18px 18px 18px;}
    .msg.user .msg-bubble{background:linear-gradient(135deg,#1e3a5f,#3b82f6);color:#fff;border-radius:18px 4px 18px 18px;}

    /* TYPING */
    .typing-wrap{display:flex;gap:10px;align-self:flex-start;}
    .typing-bubble{background:var(--surface);border:1px solid var(--border);border-radius:4px 18px 18px 18px;padding:14px 18px;display:flex;gap:5px;align-items:center;}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);animation:bounce .9s ease infinite;}
    .dot:nth-child(2){animation-delay:.15s;}
    .dot:nth-child(3){animation-delay:.3s;}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

    /* WELCOME */
    .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;text-align:center;padding:40px;}
    .welcome-icon{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,var(--purple-dark),var(--purple-light));display:flex;align-items:center;justify-content:center;font-size:30px;}
    .welcome h2{font-size:1.2rem;font-weight:800;}
    .welcome p{font-size:.85rem;color:var(--text-muted);line-height:1.7;max-width:340px;}
    .quick-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px;}
    .quick-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);border-radius:20px;padding:7px 14px;font-size:.78rem;cursor:pointer;transition:all .2s;}
    .quick-btn:hover{border-color:var(--purple-light);color:var(--purple-light);}

    /* INPUT */
    .input-area{background:var(--surface);border-top:1px solid var(--border);padding:16px 24px;flex-shrink:0;}
    .input-row{display:flex;gap:10px;align-items:flex-end;}
    .inp-wrap{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:10px 14px;display:flex;align-items:flex-end;gap:8px;transition:border-color .2s;}
    .inp-wrap:focus-within{border-color:var(--purple-light);}
    textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:.9rem;font-family:inherit;resize:none;max-height:120px;min-height:24px;line-height:1.5;}
    textarea::placeholder{color:var(--text-muted);}
    .btn-send{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--purple-dark),var(--purple-light));border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center;}
    .btn-send:hover{opacity:.85;}
    .btn-send:disabled{opacity:.4;cursor:not-allowed;}
    .input-hint{font-size:.72rem;color:var(--text-muted);margin-top:8px;text-align:center;}
  </style>
</head>
<body>

  <header class="dash-header">
    <button class="btn-back" onclick="goBack()">← 강의 목록</button>
    <div class="logo-icon">💬</div>
    <div class="header-title">비밀 AI 상담</div>
    <div class="header-badge">🔒 완전 비밀 보장</div>
    <div class="spacer"></div>
    <div class="user-chip">
      <div class="user-av" id="avatarInitial">학</div>
      <span style="color:var(--text);font-weight:600;" id="studentName">학생</span>
    </div>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </header>

  <div class="privacy-bar">
    <span class="privacy-icon">🔒</span>
    <span class="privacy-text">이 대화는 강사나 다른 누구에게도 전달되지 않습니다. 편하게 이야기하세요.</span>
    <button class="btn-clear" onclick="clearChat()">대화 초기화</button>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">💬</div>
      <h2>무슨 이야기든 들을게요</h2>
      <p>고민이나 힘든 것, 진로 고민, 인간관계까지<br>편하게 이야기해 주세요.<br>이 대화는 선생님께 전달되지 않아요.</p>
      <div class="quick-btns">
        <button class="quick-btn" onclick="quickAsk('요즘 학교생활이 너무 힘들어')">학교생활 고민</button>
        <button class="quick-btn" onclick="quickAsk('진로를 어떻게 정해야 할지 모르겠어')">진로 고민</button>
        <button class="quick-btn" onclick="quickAsk('친구 관계 때문에 스트레스 받고 있어')">인간관계</button>
        <button class="quick-btn" onclick="quickAsk('공부가 너무 힘들고 지쳐')">학업 스트레스</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <div class="inp-wrap">
        <textarea id="inputMsg" rows="1" placeholder="편하게 이야기해 보세요..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="btn-send" id="btnSend" onclick="sendMessage()">➤</button>
    </div>
    <div class="input-hint">Enter로 전송 · Shift+Enter로 줄바꿈</div>
  </div>

  <script>
    const history = [];
    let sending = false;

    function init() {
      const name = localStorage.getItem('studentName') || '학생';
      document.getElementById('studentName').textContent   = name;
      document.getElementById('avatarInitial').textContent = name.charAt(0);
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function quickAsk(text) {
      document.getElementById('inputMsg').value = text;
      sendMessage();
    }

    async function sendMessage() {
      if (sending) return;
      const ta   = document.getElementById('inputMsg');
      const text = ta.value.trim();
      if (!text) return;

      hideWelcome();
      addMsg('user', text);
      ta.value = '';
      ta.style.height = 'auto';
      history.push({ role: 'user', content: text });

      sending = true;
      document.getElementById('btnSend').disabled = true;
      const typingEl = showTyping();

      try {
        const res = await fetch('/api/ai/counsel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history })
        });
        const data = await res.json();
        typingEl.remove();

        if (res.status === 401) {
          addMsg('bot', '로그인이 필요합니다. 로그인 페이지로 이동합니다.');
          setTimeout(() => window.location.href = 'student.html', 1500);
          return;
        }

        if (data.success) {
          addMsg('bot', data.message);
          history.push({ role: 'assistant', content: data.message });
        } else {
          addMsg('bot', '오류: ' + (data.error || '응답을 받지 못했습니다.'));
        }
      } catch (e) {
        typingEl.remove();
        addMsg('bot', '서버에 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.');
      } finally {
        sending = false;
        document.getElementById('btnSend').disabled = false;
        document.getElementById('inputMsg').focus();
      }
    }

    function addMsg(role, text) {
      const wrap = document.getElementById('messages');
      const div  = document.createElement('div');
      div.className = 'msg ' + role;
      div.innerHTML = `
        <div class="msg-av">${role === 'bot' ? '💬' : '👤'}</div>
        <div class="msg-bubble">${escHtml(text)}</div>`;
      wrap.appendChild(div);
      wrap.scrollTop = wrap.scrollHeight;
    }

    function showTyping() {
      const wrap = document.getElementById('messages');
      const div  = document.createElement('div');
      div.className = 'typing-wrap';
      div.innerHTML = `
        <div class="msg-av" style="background:linear-gradient(135deg,var(--purple-dark),var(--purple-light));width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;">💬</div>
        <div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
      wrap.appendChild(div);
      wrap.scrollTop = wrap.scrollHeight;
      return div;
    }

    function hideWelcome() {
      const w = document.getElementById('welcome');
      if (w) w.remove();
    }

    function clearChat() {
      history.length = 0;
      const wrap = document.getElementById('messages');
      wrap.innerHTML = '';
      wrap.insertAdjacentHTML('afterbegin', `
        <div class="welcome" id="welcome">
          <div class="welcome-icon">💬</div>
          <h2>무슨 이야기든 들을게요</h2>
          <p>고민이나 힘든 것, 진로 고민, 인간관계까지<br>편하게 이야기해 주세요.<br>이 대화는 선생님께 전달되지 않아요.</p>
          <div class="quick-btns">
            <button class="quick-btn" onclick="quickAsk('요즘 학교생활이 너무 힘들어')">학교생활 고민</button>
            <button class="quick-btn" onclick="quickAsk('진로를 어떻게 정해야 할지 모르겠어')">진로 고민</button>
            <button class="quick-btn" onclick="quickAsk('친구 관계 때문에 스트레스 받고 있어')">인간관계</button>
            <button class="quick-btn" onclick="quickAsk('공부가 너무 힘들고 지쳐')">학업 스트레스</button>
          </div>
        </div>`);
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function goBack() { window.location.href = 'student-lectures.html'; }

    function logout() {
      fetch('/api/logout', { method: 'POST' }).catch(() => {});
      localStorage.removeItem('studentName');
      sessionStorage.clear();
      window.location.href = '/';
    }

    init();
  </script>
</body>
</html>
