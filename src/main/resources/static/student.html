<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수강생 - NFC 수업 시스템</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --primary:#4f46e5;--primary-light:#6366f1;--primary-dark:#3730a3;
      --success:#10b981;--danger:#ef4444;--warning:#f59e0b;--purple:#8b5cf6;
      --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;
      --border:#2a2a4a;--text:#e2e8f0;--text-muted:#94a3b8;
    }
    body.light{
      --bg:#f1f5f9;--surface:#ffffff;--surface2:#f8fafc;
      --border:#cbd5e1;--text:#0f172a;--text-muted:#64748b;
    }
    body{transition:background-color .25s,color .25s;}

    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

    /* ── LOGIN ── */
    #view-login{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px;}
    .login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:44px 40px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:22px;}
    .login-logo{display:flex;flex-direction:column;align-items:center;gap:12px;}
    .logo-icon-wrap{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));display:flex;align-items:center;justify-content:center;font-size:26px;}
    .login-title{font-size:1.5rem;font-weight:800;text-align:center;}
    .login-sub{font-size:.84rem;color:var(--text-muted);text-align:center;margin-top:-10px;}
    .form-group{display:flex;flex-direction:column;gap:6px;}
    label{font-size:.78rem;color:var(--text-muted);font-weight:500;}
    .inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s;}
    .inp:focus{border-color:var(--primary-light);}
    .inp::placeholder{color:var(--text-muted);}
    .btn-login{width:100%;background:var(--primary);color:#fff;border:none;border-radius:12px;padding:13px;font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
    .btn-login:hover{opacity:.85;}
    .divider{display:flex;align-items:center;gap:12px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .divider span{font-size:.75rem;color:var(--text-muted);}
    .signup-row{display:flex;align-items:center;justify-content:center;gap:8px;font-size:.84rem;color:var(--text-muted);}
    .signup-row a{color:var(--primary-light);text-decoration:none;font-weight:600;}
    .signup-row a:hover{text-decoration:underline;}
    .btn-demo{width:100%;background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:12px;padding:11px;font-size:.88rem;font-weight:500;cursor:pointer;transition:all .2s;}
    .btn-demo:hover{border-color:var(--primary-light);color:var(--primary-light);}

    /* ── HEADER ── */
    .dash-header{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;}
    .dash-logo{display:flex;align-items:center;gap:8px;font-size:1rem;font-weight:700;}
    .logo-sm{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));display:flex;align-items:center;justify-content:center;font-size:16px;}
    .lec-chip{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 12px;font-size:.78rem;color:var(--text-muted);}
    .lec-chip.live{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--success);}
    .spacer{flex:1;}
    .user-chip{display:flex;align-items:center;gap:8px;font-size:.84rem;}
    .user-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
    .btn-logout{background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:5px 12px;font-size:.78rem;cursor:pointer;transition:all .2s;}
    .btn-logout:hover{border-color:var(--danger);color:var(--danger);}

    /* ── NFC CHECK-IN VIEW ── */
    #view-nfc{flex:1;display:none;flex-direction:column;}
    .nfc-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
    .nfc-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:44px 40px;width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;gap:24px;}
    .nfc-card h2{font-size:1.2rem;font-weight:700;text-align:center;}
    .nfc-card p{font-size:.84rem;color:var(--text-muted);text-align:center;}
    .nfc-wrap{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center;}
    .ring{position:absolute;border-radius:50%;border:2px solid var(--primary-light);opacity:0;animation:pulse-ring 2.4s ease-out infinite;}
    .ring:nth-child(1){width:100%;height:100%;animation-delay:0s;}
    .ring:nth-child(2){width:72%;height:72%;animation-delay:.7s;}
    .ring:nth-child(3){width:47%;height:47%;animation-delay:1.4s;}
    @keyframes pulse-ring{0%{opacity:.55;transform:scale(.85);}100%{opacity:0;transform:scale(1.1);}}
    .nfc-core{width:108px;height:108px;background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:44px;cursor:pointer;box-shadow:0 0 40px rgba(79,70,229,.4);z-index:1;position:relative;transition:transform .15s,box-shadow .15s;}
    .nfc-core:hover{transform:scale(1.06);box-shadow:0 0 56px rgba(99,102,241,.55);}
    .nfc-core:active{transform:scale(.94);}
    .nfc-wrap.success .ring{border-color:var(--success);}
    .nfc-wrap.success .nfc-core{background:linear-gradient(135deg,#065f46,var(--success));box-shadow:0 0 44px rgba(16,185,129,.5);}
    .nfc-wrap.fail .ring{border-color:var(--danger);}
    .nfc-wrap.fail .nfc-core{background:linear-gradient(135deg,#7f1d1d,var(--danger));box-shadow:0 0 44px rgba(239,68,68,.5);}
    .nfc-label{font-size:.94rem;font-weight:600;text-align:center;}
    .nfc-sub{font-size:.78rem;color:var(--text-muted);text-align:center;}
    .demo-panel{width:100%;border-top:1px solid var(--border);padding-top:18px;display:flex;flex-direction:column;gap:10px;}
    .demo-title{font-size:.72rem;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);}
    .demo-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .btn-tag{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:.86rem;font-weight:600;cursor:pointer;transition:background .2s;}
    .btn-tag:hover{background:var(--primary-light);}
    .no-lec-card{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center;}
    .no-lec-icon{font-size:56px;margin-bottom:12px;}

    /* ── DASHBOARD ── */
    #view-dashboard{flex:1;display:none;flex-direction:column;overflow:hidden;}
    .attendance-bar{background:rgba(16,185,129,.08);border-bottom:1px solid rgba(16,185,129,.2);padding:10px 20px;display:flex;align-items:center;gap:12px;font-size:.84rem;flex-shrink:0;}
    .att-ok{display:flex;align-items:center;gap:6px;font-weight:600;color:var(--success);}
    .att-ok-dot{width:7px;height:7px;background:var(--success);border-radius:50%;animation:blink 1.2s ease infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
    .att-detail{font-size:.78rem;color:var(--text-muted);}

    /* Tabs */
    .tabs-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:4px;flex-shrink:0;}
    .tab{padding:14px 18px;background:transparent;border:none;border-bottom:2px solid transparent;font-size:.88rem;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .2s;}
    .tab:hover{color:var(--text);}
    .tab.active{color:var(--primary-light);border-bottom-color:var(--primary-light);font-weight:600;}

    /* Content */
    .tab-content{flex:1;overflow-y:auto;padding:28px;}
    .tab-content::-webkit-scrollbar{width:4px;}
    .tab-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
    .tab-pane{display:none;}
    .tab-pane.active{display:block;}
    .page-title{font-size:1.15rem;font-weight:700;margin-bottom:4px;}
    .page-sub{font-size:.84rem;color:var(--text-muted);margin-bottom:22px;}

    /* Materials */
    .materials-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
    .mat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:10px;transition:transform .2s,border-color .2s;cursor:pointer;}
    .mat-card:hover{transform:translateY(-3px);border-color:var(--primary-light);}
    .mat-card-top{display:flex;align-items:center;gap:10px;}
    .mat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .mat-icon.pdf{background:rgba(239,68,68,.15);}
    .mat-icon.img{background:rgba(16,185,129,.15);}
    .mat-icon.link{background:rgba(6,182,212,.15);}
    .mat-icon.etc{background:rgba(139,92,246,.15);}
    .mat-title{font-size:.92rem;font-weight:600;}
    .mat-desc{font-size:.78rem;color:var(--text-muted);}
    .mat-meta{font-size:.72rem;color:var(--text-muted);display:flex;align-items:center;justify-content:space-between;}
    .type-badge{padding:2px 8px;border-radius:20px;font-size:.68rem;font-weight:600;}
    .type-badge.pdf{background:rgba(239,68,68,.12);color:var(--danger);}
    .type-badge.img{background:rgba(16,185,129,.12);color:var(--success);}
    .type-badge.link{background:rgba(6,182,212,.12);color:#06b6d4;}
    .type-badge.etc{background:rgba(139,92,246,.12);color:var(--purple);}

    textarea.inp{resize:vertical;min-height:80px;font-family:inherit;}
    .answer-result.wrong{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25);color:var(--danger);}
    .answer-result.text{background:rgba(79,70,229,.08);border-color:rgba(79,70,229,.25);color:var(--primary-light);}

    /* Shared */
    .empty-state{text-align:center;padding:48px 0;color:var(--text-muted);font-size:.88rem;}
    .empty-icon{font-size:48px;margin-bottom:10px;}
    .toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:999;}
    .toast{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 18px;min-width:250px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 28px rgba(0,0,0,.4);animation:toastIn .3s ease;}
    @keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .toast.success{border-left:3px solid var(--success);}
    .toast.error{border-left:3px solid var(--danger);}
    .toast.info{border-left:3px solid var(--primary-light);}
    .toast-icon{font-size:18px;}
    .toast-text strong{display:block;font-size:.86rem;}
    .toast-text span{font-size:.76rem;color:var(--text-muted);}

    /* ── MOBILE ── */
    @media (max-width:480px){
      .login-card{padding:28px 18px;}
      .nfc-card{padding:28px 18px;}
      .tabs-bar{overflow-x:auto;gap:0;padding:0 12px;}
      .tab{padding:12px 12px;font-size:.82rem;white-space:nowrap;}
      .tab-content{padding:16px 12px;}
      .dash-header{padding:0 10px;gap:8px;}
      .lec-chip{max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
      .user-chip span{display:none;}
      .toast-wrap{left:12px;right:12px;bottom:16px;}
      .toast{min-width:unset;}
      .demo-row{grid-template-columns:1fr;}
      .materials-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
  <script>if(localStorage.getItem('theme')==='light')document.body.classList.add('light');</script>


<!-- ══════════ LOGIN ══════════ -->
<div id="view-login">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon-wrap">🎓</div>
      <div class="login-title">수강생 로그인</div>
      <div class="login-sub">수강생 계정으로 로그인하세요</div>
    </div>
    <div class="form-group">
      <label>이메일</label>
      <input class="inp" type="email" id="inp-email" placeholder="이메일 입력" onkeydown="if(event.key==='Enter')handleLogin()" />
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input class="inp" type="password" id="inp-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')handleLogin()" />
    </div>
    <button class="btn-login" onclick="handleLogin()">로그인</button>
    <div class="divider"><span>또는</span></div>
    <div class="signup-row">계정이 없으신가요? <a href="signup.html">회원가입</a></div>
    <div style="text-align:center;"><a href="index.html" style="font-size:.78rem;color:var(--text-muted);text-decoration:none;">← 메인으로</a></div>
  </div>
</div>

<!-- ══════════ NFC CHECK-IN ══════════ -->
<div id="view-nfc">
  <header class="dash-header">
    <div class="dash-logo"><div class="logo-sm">🎓</div>NFC 수업 시스템</div>
    <div class="spacer"></div>
    <div class="user-chip"><div class="user-av" id="nfc-av"></div><span id="nfc-uname" style="font-size:.84rem;"></span></div>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </header>
  <div class="nfc-screen">
    <!-- 강의 없을 때 -->
    <div class="nfc-card" id="no-lec-card" style="display:none;">
      <div class="no-lec-icon">💤</div>
      <h2>진행 중인 강의가 없습니다</h2>
      <p>강사가 강의를 시작하면 NFC를 태그할 수 있습니다</p>
      <button class="btn-demo" onclick="renderNFC()">새로고침</button>
    </div>

    <!-- NFC 태그 카드 -->
    <div class="nfc-card" id="checkin-card" style="display:none;">
      <h2 id="checkin-lec-name"></h2>
      <p id="checkin-lec-meta" style="font-size:.8rem;color:var(--text-muted);"></p>

      <div class="nfc-wrap" id="nfc-wrap">
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <div class="nfc-core" id="nfc-core" onclick="simulateTag()">📶</div>
      </div>

      <div class="nfc-label" id="nfc-label">자리의 NFC를 태그하세요</div>
      <div class="nfc-sub" id="nfc-sub">학생증을 NFC 리더기에 가까이 대세요</div>

      <div class="demo-panel">
        <div class="demo-title">데모 시뮬레이션</div>
        <div class="demo-row">
          <div>
            <label style="font-size:.72rem;color:var(--text-muted);margin-bottom:4px;display:block;">좌석 선택</label>
            <select class="inp" id="seat-select"></select>
          </div>
          <div>
            <label style="font-size:.72rem;color:var(--text-muted);margin-bottom:4px;display:block;">학번 (내 학번)</label>
            <input class="inp" type="text" id="student-id-inp" placeholder="학번 입력" />
          </div>
        </div>
        <input class="inp" type="text" id="student-name-inp" placeholder="이름 입력" />
        <button class="btn-tag" onclick="simulateTag()">📶 NFC 태그</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ DASHBOARD ══════════ -->
<div id="view-dashboard">
  <header class="dash-header">
    <div class="dash-logo"><div class="logo-sm">🎓</div>수강생</div>
    <div class="lec-chip live" id="dash-lec-chip"></div>
    <div class="spacer"></div>
    <div class="user-chip"><div class="user-av" id="dash-av"></div><span id="dash-uname" style="font-size:.84rem;"></span></div>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </header>

  <div class="attendance-bar">
    <div class="att-ok"><div class="att-ok-dot"></div>출석 완료</div>
    <div class="att-detail" id="att-detail"></div>
  </div>

  <div class="tabs-bar">
    <button class="tab active" onclick="showTab('materials', this)">📁 수업 자료</button>
  </div>

  <div class="tab-content">
    <!-- 수업 자료 -->
    <div class="tab-pane active" id="tab-materials">
      <div class="page-title">수업 자료</div>
      <div class="page-sub">강사가 올린 수업 자료를 확인하세요</div>
      <div class="materials-grid" id="materials-grid"></div>
    </div>

  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
  /* ──────── DB ──────── */
  const DB = {
    getLecture:     () => JSON.parse(localStorage.getItem('nfc_lecture')     || 'null'),
    getMaterials:   () => JSON.parse(localStorage.getItem('nfc_materials')   || '[]'),
    getSeats:       () => JSON.parse(localStorage.getItem('nfc_seats')       || '{}'),
    setSeats(s)        { localStorage.setItem('nfc_seats', JSON.stringify(s)); },
    getStudents:    () => JSON.parse(localStorage.getItem('nfc_students')    || '[]'),
    setStudents(s)     { localStorage.setItem('nfc_students', JSON.stringify(s)); },
  };

  const ROWS = ['A','B','C','D'];
  const COLS = [1,2,3,4,5,6];
  const ALL_SEATS = ROWS.flatMap(r => COLS.map(c => r+c));

  const TYPE_ICONS   = { pdf:'📄', img:'🖼', link:'🔗', etc:'📎' };
  const TYPE_LABELS  = { pdf:'PDF', img:'이미지', link:'링크', etc:'기타' };

  let session     = null; // { id, name }
  let checkedSeat = null;

  /* ──────── LOGIN ──────── */
  async function handleLogin() {
    const username = document.getElementById('inp-email').value.trim();
    const password = document.getElementById('inp-pw').value;
    if (!username || !password) { toast('error', '입력 오류', '이메일과 비밀번호를 입력하세요'); return; }

    const btn = document.querySelector('.btn-login');
    btn.disabled = true; btn.textContent = '로그인 중…';

    try {
      const res  = await fetch('/api/student/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.locked)   { toast('error', '계정 잠금',   data.message); return; }
      if (!data.success) { toast('error', '로그인 실패', data.message); return; }

      const prof = await (await fetch('/api/user/profile')).json();
      localStorage.setItem('studentName', prof.name);
      window.location.href = 'student-lectures.html';
    } catch (e) {
      toast('error', '연결 오류', '서버에 연결할 수 없습니다');
    } finally {
      btn.disabled = false; btn.textContent = '로그인';
    }
  }

  async function logout() {
    await fetch('/api/logout', { method: 'POST' }).catch(() => {});
    window.location.href = '/';
  }

  /* ──────── NFC SCREEN ──────── */
  function enterNFCScreen() {
    document.getElementById('view-login').style.display  = 'none';
    document.getElementById('view-nfc').style.display    = 'flex';

    // set user info
    ['nfc-av','dash-av'].forEach(id => document.getElementById(id).textContent   = session.name[0]);
    ['nfc-uname','dash-uname'].forEach(id => document.getElementById(id).textContent = session.name);

    // populate seat select
    const sel = document.getElementById('seat-select');
    sel.innerHTML = ALL_SEATS.map(s => `<option value="${s}">${s}</option>`).join('');

    // prefill student info
    document.getElementById('student-id-inp').value   = session.id;
    document.getElementById('student-name-inp').value = session.name;

    renderNFC();
  }

  function renderNFC() {
    const lec = DB.getLecture();
    const hasLec = lec && lec.active;
    document.getElementById('no-lec-card').style.display   = hasLec ? 'none'  : 'flex';
    document.getElementById('checkin-card').style.display  = hasLec ? 'flex'  : 'none';
    if (hasLec) {
      document.getElementById('checkin-lec-name').textContent = lec.name;
      document.getElementById('checkin-lec-meta').textContent = `강의실 ${lec.classroomCode} · 강사 ${lec.instructor} · ${lec.startTime} 시작`;
    }
  }

  /* ──────── NFC TAG ──────── */
  let tagBusy = false;

  function simulateTag() {
    if (tagBusy) return;
    const lec = DB.getLecture();
    if (!lec || !lec.active) { toast('error','강의 없음','진행 중인 강의가 없습니다'); return; }

    const seat    = document.getElementById('seat-select').value;
    const stdId   = document.getElementById('student-id-inp').value.trim()   || session.id;
    const stdName = document.getElementById('student-name-inp').value.trim() || session.name;
    if (!seat || !stdId || !stdName) { toast('error','입력 오류','좌석, 학번, 이름을 입력하세요'); return; }

    tagBusy = true;
    const wrap  = document.getElementById('nfc-wrap');
    const core  = document.getElementById('nfc-core');
    const label = document.getElementById('nfc-label');
    const sub   = document.getElementById('nfc-sub');

    label.textContent = '카드 인식 중…';
    core.textContent  = '⏳';

    setTimeout(() => {
      const seats = DB.getSeats();
      const alreadySeat = Object.keys(seats).find(k => seats[k]?.studentId === stdId);

      if (alreadySeat && alreadySeat !== seat) {
        wrap.classList.add('fail');
        core.textContent  = '⚠️';
        label.textContent = `이미 ${alreadySeat}에 등록됨`;
        sub.textContent   = stdName;
        toast('error','중복 출석',`이미 좌석 ${alreadySeat}에 출석이 등록되어 있습니다`);
        setTimeout(resetNFC, 2200);
        return;
      }

      const t    = new Date();
      const time = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
      seats[seat] = { studentId: stdId, studentName: stdName, time };
      DB.setSeats(seats);

      // register in students list
      const students = DB.getStudents();
      if (!students.find(s => s.id === stdId)) {
        students.push({ id: stdId, name: stdName });
        DB.setStudents(students);
      }

      session = { ...session, id: stdId, name: stdName };
      checkedSeat = seat;

      wrap.classList.add('success');
      core.textContent  = '✅';
      label.textContent = `${stdName} 출석 완료`;
      sub.textContent   = `좌석 ${seat} · ${time}`;
      toast('success','출석 완료',`좌석 ${seat} · ${time}`);

      setTimeout(() => {
        enterDashboard(lec, seat, time);
      }, 1600);
    }, 900);
  }

  function resetNFC() {
    const wrap = document.getElementById('nfc-wrap');
    wrap.classList.remove('success','fail');
    document.getElementById('nfc-core').textContent  = '📶';
    document.getElementById('nfc-label').textContent = '자리의 NFC를 태그하세요';
    document.getElementById('nfc-sub').textContent   = '학생증을 NFC 리더기에 가까이 대세요';
    tagBusy = false;
  }

  /* ──────── DASHBOARD ──────── */
  function enterDashboard(lec, seat, time) {
    document.getElementById('view-nfc').style.display       = 'none';
    document.getElementById('view-dashboard').style.display = 'flex';

    document.getElementById('dash-lec-chip').textContent  = `📡 ${lec.name}`;
    document.getElementById('att-detail').textContent     = `좌석 ${seat} · ${time} 입실 · ${lec.classroomCode}`;

    loadMaterials();
  }

  function showTab(name, btn) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
    if (name === 'materials') loadMaterials();
  }

  /* ──────── MATERIALS ──────── */
  function loadMaterials() {
    const lec   = DB.getLecture();
    const items = DB.getMaterials().filter(m => lec && m.lectureId === lec.id);
    const grid  = document.getElementById('materials-grid');
    if (!items.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📂</div>등록된 자료가 없습니다</div>';
      return;
    }
    grid.innerHTML = items.map(m => `
      <div class="mat-card" onclick="viewMaterial('${m.url}')">
        <div class="mat-card-top">
          <div class="mat-icon ${m.type}">${TYPE_ICONS[m.type]}</div>
          <div>
            <div class="mat-title">${m.title}</div>
            <div class="mat-desc">${m.desc || '설명 없음'}</div>
          </div>
        </div>
        <div class="mat-meta">
          <span>${m.createdAt}</span>
          <span class="type-badge ${m.type}">${TYPE_LABELS[m.type]}</span>
        </div>
      </div>`).join('');
  }

  function viewMaterial(url) {
    if (url && url.startsWith('http')) { window.open(url, '_blank'); return; }
    toast('info','자료 열기','파일 뷰어는 백엔드 연동 후 사용 가능합니다');
  }

  /* ──────── TOAST ──────── */
  function toast(type, title, msg) {
    const w = document.getElementById('toast-wrap');
    const icon = type==='success'?'✅':type==='error'?'❌':'ℹ️';
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<div class="toast-icon">${icon}</div><div class="toast-text"><strong>${title}</strong><span>${msg}</span></div>`;
    w.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  /* ──────── POLL ──────── */
  setInterval(() => {
    if (document.getElementById('view-nfc').style.display !== 'none') renderNFC();
    if (document.getElementById('view-dashboard').style.display !== 'none') {
      const active = document.querySelector('.tab-pane.active')?.id;
      if (active === 'tab-materials') loadMaterials();
    }
  }, 2500);

    function applyTheme(){const l=localStorage.getItem('theme')==='light';document.body.classList.toggle('light',l);const b=document.getElementById('themeBtn');if(b)b.textContent=l?'🌙 다크':'☀️ 라이트';}
    function toggleTheme(){const l=document.body.classList.toggle('light');localStorage.setItem('theme',l?'light':'dark');const b=document.getElementById('themeBtn');if(b)b.textContent=l?'🌙 다크':'☀️ 라이트';}
  </script>
</body>
</html>
