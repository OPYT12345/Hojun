# ================================================================
# DB 연결 설정 (실제 값은 환경변수로 주입, 없으면 기본값 사용)
# ================================================================
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:school}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# data.sql 이 JPA 테이블 생성 완료 후에 실행되도록 지연
spring.jpa.defer-datasource-initialization=true
# 서버 시작 시 data.sql 자동 실행 (INSERT IGNORE 로 중복 삽입 방지)
spring.sql.init.mode=always

# ================================================================
# 서버 포트 및 HTTPS 설정
# - 로컬: SSL_ENABLED=true, PORT=8443 (start.bat 사용)
# - Railway: SSL_ENABLED=false, PORT=Railway가 자동 주입
# ================================================================
server.port=${PORT:8443}
server.ssl.enabled=${SSL_ENABLED:true}
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_PASSWORD:school2026}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=login

# ================================================================
# 입력 제한 설정
# ================================================================
app.input.max-username-length=50
app.input.max-password-length=100

# 로그인 성공 후 이동할 경로
app.redirect.success-url=/main

# ================================================================
# 세션 보안 설정
# ================================================================
# 비활성 세션 만료 시간 (30분 — 장시간 방치된 세션 자동 해제)
server.servlet.session.timeout=30m
# HttpOnly: JavaScript에서 쿠키 접근 차단 (XSS 쿠키 탈취 방어)
server.servlet.session.cookie.http-only=true
# Secure: HTTPS에서만 쿠키 전송 (HTTP 다운그레이드 방어)
server.servlet.session.cookie.secure=${COOKIE_SECURE:true}
# SameSite=Strict: 외부 사이트에서의 세션 쿠키 전송 차단 (CSRF 방어)
server.servlet.session.cookie.same-site=strict

# ================================================================
# AI API 예산 한도 설정 (OpenAI 비용 보호)
# ================================================================
# 사용자별 시간당 최대 AI 호출 횟수
app.ai.max-calls-per-user-per-hour=20
# 전체 서버 일별 최대 AI 호출 횟수 (초과 시 모든 사용자 AI 기능 일시 중단)
app.ai.max-calls-global-per-day=300

# ================================================================
# 파일 업로드 설정
# ================================================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=${UPLOAD_DIR:uploads}

# ================================================================
# OpenAI API 설정
# 환경변수 OPENAI_API_KEY 로 주입하세요 (예: export OPENAI_API_KEY=sk-...)
# ================================================================
openai.api-key=${OPENAI_API_KEY:}

# ================================================================
# Web Push (VAPID) 설정
# 비워두면 시작 시 자동 생성 (재시작 시 기존 구독 초기화됨)
# 로그에 출력된 키를 환경변수로 고정하면 구독 영구 유지 가능
# ================================================================
vapid.public-key=${VAPID_PUBLIC_KEY:}
vapid.private-key=${VAPID_PRIVATE_KEY:}
vapid.subject=${VAPID_SUBJECT:mailto:admin@school.local}
