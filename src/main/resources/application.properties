# ================================================================
# DB 연결 설정 (실제 값은 환경변수로 주입, 없으면 기본값 사용)
# ================================================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/school?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# data.sql 이 JPA 테이블 생성 완료 후에 실행되도록 지연
spring.jpa.defer-datasource-initialization=true
# 서버 시작 시 data.sql 자동 실행 (INSERT IGNORE 로 중복 삽입 방지)
spring.sql.init.mode=always

# ================================================================
# HTTPS 설정 (포트 8443)
# ================================================================
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_PASSWORD:school2026}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=login

# ================================================================
# 입력 제한 설정 (AI 비용 보호용)
# ================================================================
app.input.max-username-length=50
app.input.max-password-length=100

# 로그인 성공 후 이동할 경로
app.redirect.success-url=/main

# ================================================================
# 파일 업로드 설정
# ================================================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=${UPLOAD_DIR:uploads}

# ================================================================
# OpenAI API 설정
# 환경변수 OPENAI_API_KEY 로 주입하세요 (예: export OPENAI_API_KEY=sk-...)
# ================================================================
openai.api-key=${OPENAI_API_KEY}
