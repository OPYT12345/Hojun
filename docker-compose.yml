version: '3.8'

services:
  # ================================================================
  # MySQL 데이터베이스
  # ================================================================
  db:
    image: mysql:8.0
    container_name: nfc-db
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: school
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ================================================================
  # Spring Boot 애플리케이션
  # ================================================================
  app:
    build: .
    container_name: nfc-app
    ports:
      - "8443:8443"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: 1234
      SSL_PASSWORD: school2026
      
      OPENAI_API_KEY: your-openai-api-key-here
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  uploads_data:
