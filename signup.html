<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 - NFC 수업 시스템</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --primary:#4f46e5; --primary-light:#6366f1;
      --cyan:#06b6d4; --cyan-dark:#0e7490;
      --success:#10b981; --danger:#ef4444;
      --bg:#0f0f1a; --surface:#1a1a2e; --surface2:#16213e;
      --border:#2a2a4a; --text:#e2e8f0; --text-muted:#94a3b8;
    }
    body {
      font-family:'Segoe UI',system-ui,sans-serif;
      background:var(--bg); color:var(--text);
      min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:40px 16px;
    }
    .card {
      background:var(--surface); border:1px solid var(--border); border-radius:24px;
      padding:44px 40px; width:100%; max-width:480px;
      display:flex; flex-direction:column; gap:24px;
    }
    .card-header { text-align:center; }
    .logo { display:inline-flex; align-items:center; gap:8px; font-size:1rem; font-weight:700; margin-bottom:20px; text-decoration:none; color:var(--text); }
    .logo-icon { width:34px; height:34px; border-radius:8px; font-size:16px; background:linear-gradient(135deg,var(--primary),#818cf8); display:flex; align-items:center; justify-content:center; }
    h2 { font-size:1.5rem; font-weight:800; margin-bottom:6px; }
    .subtitle { font-size:.86rem; color:var(--text-muted); }

    /* Role toggle */
    .role-toggle { display:flex; background:var(--surface2); border-radius:12px; padding:4px; gap:4px; }
    .role-opt {
      flex:1; padding:10px; text-align:center; border-radius:9px; cursor:pointer;
      font-size:.88rem; font-weight:600; color:var(--text-muted); transition:all .2s; border:none; background:transparent;
    }
    .role-opt.active { background:var(--primary); color:#fff; }
    .role-opt.instructor.active { background:linear-gradient(135deg,var(--cyan-dark),var(--cyan)); }

    /* Form */
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    label { font-size:.78rem; color:var(--text-muted); font-weight:500; }
    input, select {
      background:var(--surface2); border:1px solid var(--border); border-radius:10px;
      padding:11px 14px; color:var(--text); font-size:.9rem; outline:none; transition:border-color .2s; width:100%;
    }
    input:focus, select:focus { border-color:var(--primary-light); }
    input::placeholder { color:var(--text-muted); }

    /* Divider */
    .divider { display:flex; align-items:center; gap:12px; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .divider span { font-size:.75rem; color:var(--text-muted); }

    /* Buttons */
    .btn-signup {
      width:100%; background:var(--primary); color:#fff; border:none; border-radius:12px;
      padding:14px; font-size:.95rem; font-weight:700; cursor:pointer; transition:opacity .2s;
    }
    .btn-signup:hover { opacity:.85; }
    .btn-signup.instructor { background:linear-gradient(135deg,var(--cyan-dark),var(--cyan)); }

    .login-link { text-align:center; font-size:.85rem; color:var(--text-muted); }
    .login-link a { color:var(--primary-light); text-decoration:none; font-weight:600; }
    .login-link a:hover { text-decoration:underline; }

    /* Terms */
    .terms { display:flex; align-items:flex-start; gap:10px; font-size:.8rem; color:var(--text-muted); }
    .terms input[type=checkbox] { margin-top:2px; width:auto; flex-shrink:0; }
    .terms a { color:var(--primary-light); text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <a class="logo" href="index.html">
        <div class="logo-icon">📡</div>NFC 수업 시스템
      </a>
      <h2>회원가입</h2>
      <p class="subtitle">역할을 선택하고 계정을 만드세요</p>
    </div>

    <div class="role-toggle">
      <button class="role-opt active" id="role-student" onclick="setRole('student')">🎓 수강생</button>
      <button class="role-opt instructor" id="role-instructor" onclick="setRole('instructor')">👨‍🏫 강사</button>
    </div>

    <div style="display:flex;flex-direction:column;gap:14px;" id="signup-form">
      <div class="form-row">
        <div class="form-group">
          <label>이름</label>
          <input type="text" id="inp-name" placeholder="홍길동" />
        </div>
        <div class="form-group" id="group-id">
          <label id="label-id">학번</label>
          <input type="text" id="inp-number" placeholder="20241234" />
        </div>
      </div>
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="inp-email" placeholder="example@school.ac.kr" />
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="inp-pw" placeholder="8자 이상" />
      </div>
      <div class="form-group">
        <label>비밀번호 확인</label>
        <input type="password" id="inp-pw2" placeholder="비밀번호 재입력" />
      </div>
      <div class="form-group" id="group-dept" style="display:none;">
        <label>소속 학과 / 부서</label>
        <input type="text" id="inp-dept" placeholder="컴퓨터공학과" />
      </div>

      <div class="divider"><span>약관 동의</span></div>

      <div class="terms">
        <input type="checkbox" id="terms1" />
        <label for="terms1">[필수] <a href="#">이용약관</a> 및 <a href="#">개인정보 처리방침</a>에 동의합니다</label>
      </div>
      <div class="terms">
        <input type="checkbox" id="terms2" />
        <label for="terms2">[선택] 서비스 관련 이메일 알림 수신에 동의합니다</label>
      </div>

      <button class="btn-signup" id="btn-signup" onclick="handleSignup()">회원가입</button>
    </div>

    <div class="login-link">이미 계정이 있으신가요?
      <a href="index.html" id="back-login">로그인으로 돌아가기</a>
    </div>
  </div>

  <script>
    let currentRole = 'student';

    function setRole(role) {
      currentRole = role;
      document.getElementById('role-student').classList.toggle('active', role === 'student');
      document.getElementById('role-instructor').classList.toggle('active', role === 'instructor');
      document.getElementById('label-id').textContent = role === 'student' ? '학번' : '교번';
      document.getElementById('inp-number').placeholder = role === 'student' ? '20241234' : '교번 입력';
      document.getElementById('group-dept').style.display = role === 'instructor' ? 'flex' : 'none';
      document.getElementById('btn-signup').className = 'btn-signup' + (role === 'instructor' ? ' instructor' : '');
    }

    function handleSignup() {
      // TODO: Connect to DB — colleague will implement
      alert('회원가입 API 연동 예정입니다');
    }
  </script>
</body>
</html>
